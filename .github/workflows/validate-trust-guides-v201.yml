name: Validate restored trust guides v201

on:
  pull_request:
    paths:
      - "content/v178/editorial-methodology-ar.json"
      - "content/v181/evaluate-mental-health-information-ar.json"
      - "content/v191/source-citation-guide-ar.json"
      - "scripts/publish_trust_guides_v201.py"
      - "scripts/enforce_platform_identity_v201.py"
      - "tests/test_trust_guides_v201.py"
      - ".github/workflows/validate-trust-guides-v201.yml"
  push:
    branches:
      - agent/platform-content-recovery-v201
    paths:
      - "content/v178/editorial-methodology-ar.json"
      - "content/v181/evaluate-mental-health-information-ar.json"
      - "content/v191/source-citation-guide-ar.json"
      - "scripts/publish_trust_guides_v201.py"
      - "scripts/enforce_platform_identity_v201.py"
      - "tests/test_trust_guides_v201.py"
      - ".github/workflows/validate-trust-guides-v201.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile publisher and tests
        run: python -m py_compile scripts/publish_trust_guides_v201.py tests/test_trust_guides_v201.py
      - name: Validate content sources
        run: |
          python -m json.tool content/v178/editorial-methodology-ar.json >/dev/null
          python -m json.tool content/v181/evaluate-mental-health-information-ar.json >/dev/null
          python -m json.tool content/v191/source-citation-guide-ar.json >/dev/null
      - name: Run trust guide tests
        run: python -m unittest -v tests/test_trust_guides_v201.py
