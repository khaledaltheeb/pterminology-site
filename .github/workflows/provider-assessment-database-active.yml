name: Provider Assessment Database Active Baseline

on:
  push:
    branches:
      - feature/provider-assessment-platform-foundation
    paths:
      - "provider-assessment-platform/database/postgresql.v0.2.0.sql"
      - "provider-assessment-platform/database/MIGRATION_MANIFEST.json"
      - "provider-assessment-platform/database/ACTIVE_BASELINE.md"
      - "provider-assessment-platform/database/tests/rls-smoke-v2.sql"
      - "provider-assessment-platform/tools/validate_database_active.py"
      - ".github/workflows/provider-assessment-database-active.yml"
  pull_request:
    paths:
      - "provider-assessment-platform/database/postgresql.v0.2.0.sql"
      - "provider-assessment-platform/database/MIGRATION_MANIFEST.json"
      - "provider-assessment-platform/database/ACTIVE_BASELINE.md"
      - "provider-assessment-platform/database/tests/rls-smoke-v2.sql"
      - "provider-assessment-platform/tools/validate_database_active.py"
      - ".github/workflows/provider-assessment-database-active.yml"

permissions:
  contents: read

concurrency:
  group: provider-assessment-db-active-${{ github.ref }}-${{ matrix.postgres }}
  cancel-in-progress: true

jobs:
  validate-active-baseline:
    name: PostgreSQL ${{ matrix.postgres }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        postgres: ["15", "16"]

    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: provider_assessment_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d provider_assessment_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate active migration manifest and invariants
        run: python provider-assessment-platform/tools/validate_database_active.py

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Apply active baseline
        env:
          PGPASSWORD: postgres
        run: >-
          psql
          --host 127.0.0.1
          --port 5432
          --username postgres
          --dbname provider_assessment_test
          --set ON_ERROR_STOP=1
          --file provider-assessment-platform/database/postgresql.v0.2.0.sql

      - name: Run tenant, assignment, safety, and immutability tests
        env:
          PGPASSWORD: postgres
        run: >-
          psql
          --host 127.0.0.1
          --port 5432
          --username postgres
          --dbname provider_assessment_test
          --set ON_ERROR_STOP=1
          --file provider-assessment-platform/database/tests/rls-smoke-v2.sql
