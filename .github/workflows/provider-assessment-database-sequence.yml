name: Provider Assessment Database Sequence 0.2.1

on:
  push:
    branches:
      - feature/provider-assessment-platform-foundation
    paths:
      - "provider-assessment-platform/database/postgresql.v0.2.0.sql"
      - "provider-assessment-platform/database/postgresql.v0.2.1-review-versioning.sql"
      - "provider-assessment-platform/database/MIGRATION_SEQUENCE.v0.2.1.json"
      - "provider-assessment-platform/database/tests/rls-smoke-v2.sql"
      - "provider-assessment-platform/database/tests/review-versioning-smoke.sql"
      - "provider-assessment-platform/tools/validate_database_sequence.py"
      - ".github/workflows/provider-assessment-database-sequence.yml"
  pull_request:
    paths:
      - "provider-assessment-platform/database/postgresql.v0.2.0.sql"
      - "provider-assessment-platform/database/postgresql.v0.2.1-review-versioning.sql"
      - "provider-assessment-platform/database/MIGRATION_SEQUENCE.v0.2.1.json"
      - "provider-assessment-platform/database/tests/rls-smoke-v2.sql"
      - "provider-assessment-platform/database/tests/review-versioning-smoke.sql"
      - "provider-assessment-platform/tools/validate_database_sequence.py"
      - ".github/workflows/provider-assessment-database-sequence.yml"

permissions:
  contents: read

concurrency:
  group: provider-assessment-db-sequence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-sequence:
    name: PostgreSQL ${{ matrix.postgres }} sequence
    runs-on: ubuntu-latest
    timeout-minutes: 18
    strategy:
      fail-fast: false
      matrix:
        postgres: ["15", "16"]

    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: provider_assessment_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d provider_assessment_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate sequence manifest and controls
        run: python provider-assessment-platform/tools/validate_database_sequence.py

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Apply baseline and isolation tests
        env:
          PGPASSWORD: postgres
        run: |
          psql --host 127.0.0.1 --username postgres --dbname provider_assessment_test --set ON_ERROR_STOP=1 --file provider-assessment-platform/database/postgresql.v0.2.0.sql
          psql --host 127.0.0.1 --username postgres --dbname provider_assessment_test --set ON_ERROR_STOP=1 --file provider-assessment-platform/database/tests/rls-smoke-v2.sql

      - name: Apply review-versioning migration and tests
        env:
          PGPASSWORD: postgres
        run: |
          psql --host 127.0.0.1 --username postgres --dbname provider_assessment_test --set ON_ERROR_STOP=1 --file provider-assessment-platform/database/postgresql.v0.2.1-review-versioning.sql
          psql --host 127.0.0.1 --username postgres --dbname provider_assessment_test --set ON_ERROR_STOP=1 --file provider-assessment-platform/database/tests/review-versioning-smoke.sql
