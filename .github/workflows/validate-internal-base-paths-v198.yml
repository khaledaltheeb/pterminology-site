name: Validate internal GitHub Pages base paths v198

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/normalize_internal_base_paths_v198.py'
      - 'tests/test_internal_base_paths_v198.py'
      - 'scripts/apply_homepage_v20.py'
      - '.github/workflows/validate-all-labs-v22.yml'
      - '.github/workflows/validate-internal-base-paths-v198.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/normalize_internal_base_paths_v198.py'
      - 'tests/test_internal_base_paths_v198.py'
      - 'scripts/apply_homepage_v20.py'
      - '.github/workflows/validate-all-labs-v22.yml'
      - '.github/workflows/validate-internal-base-paths-v198.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile normalizer and tests
        run: python -m py_compile scripts/normalize_internal_base_paths_v198.py tests/test_internal_base_paths_v198.py scripts/apply_homepage_v20.py
      - name: Run absolute and root-relative URL contracts
        run: python -m unittest -v tests/test_internal_base_paths_v198.py
      - name: Build synthetic site and prove zero missing repository prefixes
        run: |
          set -euxo pipefail
          rm -rf base-path-review
          mkdir -p base-path-review/api base-path-review/assets base-path-review/care-guides
          cat > base-path-review/index.html <<'HTML'
          <!doctype html><html><head><link rel="canonical" href="https://khaledaltheeb.github.io/care-guides/"><link rel="manifest" href="/manifest.webmanifest"></head><body><a href="/care-guides/">الأدلة</a><img src=/assets/logo.svg alt=""><style>.x{background:url(/assets/x.svg)}</style></body></html>
          HTML
          cat > base-path-review/sitemap.xml <<'XML'
          <?xml version="1.0"?><urlset><url><loc>https://khaledaltheeb.github.io/care-guides/</loc></url></urlset>
          XML
          printf '{"start_url":"/","scope":"/"}\n' > base-path-review/manifest.webmanifest
          python scripts/normalize_internal_base_paths_v198.py base-path-review
          python scripts/normalize_internal_base_paths_v198.py base-path-review --check-only
          grep -q 'https://khaledaltheeb.github.io/pterminology-site/care-guides/' base-path-review/index.html
          grep -q 'href="/pterminology-site/care-guides/"' base-path-review/index.html
          grep -q '"status": "passed"' base-path-review/api/internal-base-paths-v198.json
          ! grep -R -E 'https?://khaledaltheeb\.github\.io/(?!pterminology-site/)' base-path-review --include='*.html' --include='*.xml' --include='*.json' --include='*.webmanifest' -P
      - name: Upload normalization evidence
        uses: actions/upload-artifact@v4
        with:
          name: internal-base-paths-v198-review
          path: base-path-review
          if-no-files-found: error
          retention-days: 14
