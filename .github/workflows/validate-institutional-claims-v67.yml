name: Validate institutional claims registry v67

on:
  pull_request:
    paths:
      - 'data/verified-institutional-claims.json'
      - 'docs/VERIFIED_CLAIMS_REGISTRY_AR.md'
      - 'tests/test_verified_institutional_claims_v67.py'
      - '.github/workflows/validate-institutional-claims-v67.yml'
  push:
    branches: [main]
    paths:
      - 'data/verified-institutional-claims.json'
      - 'docs/VERIFIED_CLAIMS_REGISTRY_AR.md'
      - 'tests/test_verified_institutional_claims_v67.py'
      - '.github/workflows/validate-institutional-claims-v67.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate registry contract and documentation
        run: python -m unittest tests/test_verified_institutional_claims_v67.py
