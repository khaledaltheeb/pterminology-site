# Revalidated after the Arabic autism guide integration; pull_request checks run against the current main merge result.
name: Validate ADHD journey links v43

on:
  pull_request:
    branches: ["main"]
    paths:
      - "scripts/link_care_guides_v21.py"
      - "scripts/audit_adhd_journey_links_v42.py"
      - ".github/workflows/validate-adhd-journey-links-v42.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-journey:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Compile link and audit scripts
        run: python -m py_compile scripts/link_care_guides_v21.py scripts/audit_adhd_journey_links_v42.py
      - name: Build representative generated-site fixture
        run: |
          set -euxo pipefail
          mkdir -p _site/care-guides/adhd-family-practical-guide _site/care-guides/autism-family-practical-guide _site/sectors/family _site/encyclopedia _site/api
          cat > _site/index.html <<'HTML'
          <html><body><main><a href="tips/">النصائح</a><a class="btn secondary" href="tips/">افتح الأدلة العملية</a></main></body></html>
          HTML
          cat > _site/care-guides/index.html <<'HTML'
          <html><body><main><a href="/pterminology-site/care-guides/adhd-family-practical-guide/">دليل ADHD</a><a href="/pterminology-site/care-guides/autism-family-practical-guide/">دليل التوحد</a></main></body></html>
          HTML
          cat > _site/sectors/family/index.html <<'HTML'
          <html><body><main><h1>مركز الأسرة</h1></main></body></html>
          HTML
          cat > _site/encyclopedia/index.html <<'HTML'
          <html><body><main><h1>الموسوعة</h1></main></body></html>
          HTML
          cat > _site/care-guides/adhd-family-practical-guide/index.html <<'HTML'
          <html><head><link rel="canonical" href="https://khaledaltheeb.github.io/pterminology-site/care-guides/adhd-family-practical-guide/"><script type="application/ld+json">{"@type":"Article"}</script><script type="application/ld+json">{"@type":"BreadcrumbList"}</script></head><body><main><h1>دليل ADHD</h1></main></body></html>
          HTML
          cat > _site/care-guides/autism-family-practical-guide/index.html <<'HTML'
          <html><head><link rel="canonical" href="https://khaledaltheeb.github.io/pterminology-site/care-guides/autism-family-practical-guide/"><script type="application/ld+json">{"@type":"Article"}</script><script type="application/ld+json">{"@type":"BreadcrumbList"}</script></head><body><main><h1>دليل التوحد</h1></main></body></html>
          HTML
          cat > _site/sitemap-care-guides.xml <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"><url><loc>https://khaledaltheeb.github.io/pterminology-site/care-guides/adhd-family-practical-guide/</loc></url><url><loc>https://khaledaltheeb.github.io/pterminology-site/care-guides/autism-family-practical-guide/</loc></url></urlset>
          XML
          cat > _site/sitemap.xml <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"><url><loc>https://khaledaltheeb.github.io/pterminology-site/</loc></url><sitemap><loc>https://khaledaltheeb.github.io/pterminology-site/sitemap-care-guides.xml</loc></sitemap></urlset>
          XML
      - name: Link journeys, repair mixed sitemap and prove idempotence
        run: |
          set -euxo pipefail
          python scripts/link_care_guides_v21.py _site
          python scripts/link_care_guides_v21.py _site
          python scripts/audit_adhd_journey_links_v42.py _site
      - name: Enforce exact contextual-link and sitemap contracts
        run: |
          python - <<'PY'
          import json
          import xml.etree.ElementTree as ET
          from pathlib import Path
          report=json.loads(Path('_site/api/adhd-journey-links-v42.json').read_text(encoding='utf-8'))
          assert report['failed_checks']==[],report
          assert report['actual_inbound_links']==3,report
          assert report['actual_outgoing_links']==3,report
          assert report['main_sitemap_root']=='urlset',report
          linked=json.loads(Path('_site/api/care-guides-homepage-v21.json').read_text(encoding='utf-8'))
          assert linked['idempotent_blocks'] is True,linked
          assert linked['main_sitemap_valid'] is True,linked
          assert all(linked[k] for k in (
              'adhd_inbound_from_care_hub','adhd_inbound_from_family_hub','adhd_inbound_from_encyclopedia_hub',
              'adhd_outgoing_to_care_hub','adhd_outgoing_to_family_hub','adhd_outgoing_to_encyclopedia_search',
              'autism_inbound_from_care_hub','autism_inbound_from_family_hub','autism_inbound_from_encyclopedia_hub',
              'autism_outgoing_to_care_hub','autism_outgoing_to_family_hub','autism_outgoing_to_encyclopedia_search'
          )),linked
          root=ET.parse('_site/sitemap.xml').getroot()
          local=lambda tag: tag.rsplit('}',1)[-1]
          assert local(root.tag)=='urlset'
          assert not any(local(child.tag)=='sitemap' for child in root)
          urls={node.text.strip() for node in root.findall('{*}url/{*}loc') if node.text}
          assert 'https://khaledaltheeb.github.io/pterminology-site/care-guides/adhd-family-practical-guide/' in urls
          assert 'https://khaledaltheeb.github.io/pterminology-site/care-guides/autism-family-practical-guide/' in urls
          PY
      - name: Upload link evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adhd-journey-links-v43
          path: _site/api/*.json
          if-no-files-found: error
          retention-days: 14
