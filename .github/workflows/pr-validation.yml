name: Validate luminous v10 release

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-v10:
    runs-on: ubuntu-latest
    env:
      SITE_BASE: https://khaledaltheeb.github.io/pterminology-site/
    steps:
      - uses: actions/checkout@v4

      - name: Build and diagnose v10
        run: |
          set -uo pipefail
          cat .v10bundle/part00 .v10bundle/part01 .v10bundle/part02 .v10bundle/part03 .v10bundle/part04 | base64 --decode > /tmp/v10-source.tar.gz
          tar -xzf /tmp/v10-source.tar.gz
          cat .generator-v6/part00 .generator-v6/part01 .generator-v6/part02 .generator-v6/part03 > build_site.py
          python -m py_compile build_site.py scripts/scale_site_v8.py scripts/design_content_v10.py expand_site_v9.py
          python scripts/verify_enricher_v7.py >/dev/null
          python scripts/verify_expander_v9.py >/dev/null
          python build_site.py >/dev/null
          python enrich_site_v7.py >/dev/null
          cp google644f1f7a8b7aaa2b.html _site/google644f1f7a8b7aaa2b.html
          python scripts/scale_site_v8.py >/dev/null
          python expand_site_v9.py >/dev/null
          if ! python scripts/design_content_v10.py > /tmp/v10-generator.log 2>&1; then
            cat /tmp/v10-generator.log
            exit 1
          fi
          cat /tmp/v10-generator.log

      - name: Verify v10 release contract
        run: |
          set -euo pipefail
          test "$(find _site/encyclopedia -mindepth 2 -name index.html | wc -l)" -eq 2000
          test "$(find _site/sectors -mindepth 3 -name index.html | wc -l)" -eq 80
          test "$(find _site/sectors -mindepth 2 -maxdepth 2 -name index.html | wc -l)" -eq 4
          test "$(find _site/tips -mindepth 2 -name index.html | wc -l)" -eq 20
          test "$(find _site/assets/illustrations -name '*.svg' | wc -l)" -eq 5
          test "$(grep -o '<url>' _site/sitemap-sectors.xml | wc -l)" -eq 84
          test "$(grep -o '<url>' _site/sitemap-tips.xml | wc -l)" -eq 21
          grep -q 'theme-v10.css' _site/index.html
          grep -q 'الصحة النفسية للمرأة' _site/sectors/women/index.html
          grep -q 'نصائح نفسية عملية' _site/tips/index.html
          python - <<'PY'
          import json
          from pathlib import Path
          r=json.loads((Path('_site')/'api/build-report-v10.json').read_text(encoding='utf-8'))
          assert r['sector_articles']==80 and r['practical_tips']==120 and r['new_indexable_urls']==105
          html=list(Path('_site').rglob('*.html'))
          assert all('theme-v10.css' in p.read_text(encoding='utf-8',errors='ignore') for p in html)
          print(r)
          PY
