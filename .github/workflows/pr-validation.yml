name: Validate scalable v8 release on pull requests

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-v8:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reconstruct and verify generators
        run: |
          set -euo pipefail
          cat .generator-v6/part00 .generator-v6/part01 .generator-v6/part02 .generator-v6/part03 > build_site.py
          python -m py_compile build_site.py
          python scripts/verify_enricher_v7.py
          python -m py_compile scripts/scale_site_v8.py

      - name: Build complete v8 site
        env:
          SITE_BASE: https://khaledaltheeb.github.io/pterminology-site/
        run: |
          set -euo pipefail
          python build_site.py
          python enrich_site_v7.py
          cp google644f1f7a8b7aaa2b.html _site/google644f1f7a8b7aaa2b.html
          python scripts/scale_site_v8.py

      - name: Verify v8 contract and sitemap readability
        run: |
          set -euo pipefail
          test "$(find _site/encyclopedia -mindepth 2 -name index.html | wc -l)" -eq 2000
          test "$(find _site/hubs -mindepth 2 -name index.html | wc -l)" -eq 200
          test "$(grep -o '<url>' _site/sitemap-terms-1.xml | wc -l)" -eq 1000
          test "$(grep -o '<url>' _site/sitemap-terms-2.xml | wc -l)" -eq 1000
          test "$(grep -o '<url>' _site/sitemap-hubs.xml | wc -l)" -ge 200
          grep -q '<sitemapindex' _site/sitemap.xml
          grep -q 'sitemap-terms-1.xml' _site/sitemap.xml
          grep -q 'sitemap-terms-2.xml' _site/sitemap.xml
          grep -q 'sitemap-hubs.xml' _site/sitemap.xml
          grep -q 'sitemap-core.xml' _site/sitemap.xml
          grep -q '"count":2000' _site/api/encyclopedia-v8.json
          grep -qx 'google-site-verification: google644f1f7a8b7aaa2b.html' _site/google644f1f7a8b7aaa2b.html
          python - <<'PY'
          import json, xml.etree.ElementTree as ET
          from pathlib import Path
          r=Path('_site')
          assert ET.parse(r/'sitemap.xml').getroot().tag.endswith('sitemapindex')
          data=json.loads((r/'api/encyclopedia-v8.json').read_text(encoding='utf-8'))
          assert data['count']==2000 and len(data['items'])==2000
          assert len({x['slug'] for x in data['items']})==2000
          assert len({x['ar'] for x in data['items']})==2000
          print('v8 contract passed')
          PY
