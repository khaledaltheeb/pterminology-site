name: Activate every professional assessment workflow

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/provider-demo-activate-all-workflows.yml"

permissions:
  contents: write

concurrency:
  group: provider-demo-professional-activation
  cancel-in-progress: false

jobs:
  activate-and-remove:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Activate professional workflows
        run: |
          python - <<'PY'
          from pathlib import Path

          index = Path('provider-assessment-demo/index.html')
          text = index.read_text(encoding='utf-8')
          if 'professional-master-registry.js' not in text:
              text = text.replace(
                  '  <script src="catalog-extra.js" defer></script>\n  <script src="app.js" defer></script>',
                  '  <script src="catalog-extra.js" defer></script>\n  <script src="professional-master-registry.js" defer></script>\n  <script src="app.js" defer></script>',
                  1,
              )
          if 'professional-workflow.js' not in text:
              text = text.replace(
                  '  <script src="enhancements.js" defer></script>',
                  '  <script src="enhancements.js" defer></script>\n  <script src="professional-workflow.js" defer></script>',
                  1,
              )
          text = text.replace('دليل مصنف للمقاييس المهنية دون نسخ بنودها.', 'سجل رئيسي للمقاييس والفحوص المهنية مع تخطيط التطبيق وتوثيق النتائج.')
          text = text.replace('دليل المقاييس المهنية', 'المقاييس والفحوص المهنية')
          text = text.replace('دليل مصنف — دون بنود محمية', 'سجل مهني مصنف وقابل للعمل')
          text = text.replace(
              'لا تُعرض بنود أو مفاتيح تصحيح أو جداول معيارية للمقاييس المحمية. التفعيل المهني لاحقًا يتطلب ترخيص الأداة، حق الرقمنة، مؤهل المستخدم، النسخة اللغوية، والمراجعة المؤسسية.',
              'جميع المقاييس متاحة للتخطيط والتعيين وتسجيل التطبيق والنتيجة داخل سجل الحالة. عند كون المقياس محميًا تستخدم النسخة الأصلية المرخصة ثم توثق النتيجة هنا دون نسخ البنود أو مفاتيح التصحيح.'
          )
          index.write_text(text, encoding='utf-8')

          registry = Path('provider-assessment-demo/professional-master-registry.js')
          text = registry.read_text(encoding='utf-8')
          replacements = {
              'locked_pending_rights': 'workflow_available_rights_required',
              'locked_or_link_only': 'workflow_available_or_official_link',
              'const statusOf=s=>s==="external_result_import"||s==="external_result_import_or_permission_review"?"external":s.includes("buildable")||s.includes("official")?"guide":"locked";': 'const statusOf=s=>s.startsWith("external")?"external":"guide";',
              'access:group.activationStatus.startsWith("external")?"تسجيل أو استيراد نتيجة من الجهة المختصة":group.activationStatus.includes("buildable")?"يمكن بناء بروتوكول أصلي بعد المراجعة":"يتطلب تحققًا رسميًا من الترخيص والمؤهل وحق الرقمنة",': 'access:group.activationStatus.startsWith("external")?"مسار متاح لتسجيل الفحص السريري أو استيراد نتيجته":"مسار عمل متاح للتخطيط والتعيين وتسجيل النتيجة؛ التطبيق الرسمي يتطلب النسخة الأصلية والمؤهل المناسب",',
              'note:"غير مفعّل كبنود اختبار داخل المنصة. يمكن توثيق الخطة أو النتيجة الخارجية فقط حتى اكتمال البحث والحقوق.",': 'note:"متاح لإدارة التطبيق وتوثيق النتيجة داخل سجل الحالة. لا تنسخ المنصة البنود أو مفاتيح التصحيح المحمية دون ترخيص.",',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Expected registry token not found: {old[:60]}')
              text = text.replace(old, new)
          marker = '  const existing=new Set(data.professional.map(x=>String(x.name||"").trim().toLowerCase()));'
          normalization = '''  for(const item of data.professional){
            if(item.status==="locked")item.status="guide";
            item.access=item.status==="external"?"مسار متاح لتسجيل الفحص أو استيراد النتيجة":"مسار عمل متاح للتخطيط والتعيين وتسجيل النتيجة";
            item.note="يمكن استخدام سجل العمل لكل مقياس. التطبيق الرسمي للبنود والدرجات المعيارية يتطلب النسخة الأصلية والترخيص والمؤهل المناسب.";
          }
'''
          if normalization.strip() not in text:
              text = text.replace(marker, marker + '\n' + normalization, 1)
          registry.write_text(text, encoding='utf-8')
          PY

          rm -f .github/workflows/provider-demo-enable-professional.yml
          rm -f .github/workflows/provider-demo-activate-all-workflows.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add provider-assessment-demo/index.html provider-assessment-demo/professional-master-registry.js .github/workflows/provider-demo-enable-professional.yml .github/workflows/provider-demo-activate-all-workflows.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Assessment demo: activate every professional workflow"
          git push
