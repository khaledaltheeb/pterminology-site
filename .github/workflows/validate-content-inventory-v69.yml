name: Validate content inventory v69

on:
  pull_request:
    paths:
      - 'scripts/audit_content_inventory_v69.py'
      - 'tests/test_content_inventory_v69.py'
      - 'docs/CONTENT_INVENTORY_V69_AR.md'
      - '.github/workflows/validate-content-inventory-v69.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/audit_content_inventory_v69.py'
      - 'tests/test_content_inventory_v69.py'
      - 'docs/CONTENT_INVENTORY_V69_AR.md'
      - '.github/workflows/validate-content-inventory-v69.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile inventory auditor
        run: python -m py_compile scripts/audit_content_inventory_v69.py
      - name: Test classification, duplicate detection and exports
        run: python -m unittest tests/test_content_inventory_v69.py
