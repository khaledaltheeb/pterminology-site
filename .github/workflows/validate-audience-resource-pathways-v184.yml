name: Validate audience and resource pathways v184

on:
  pull_request:
    branches: [main]
    paths:
      - 'content/v184/audience-resource-pathways-ar.json'
      - 'scripts/publish_audience_resource_pathways_v184.py'
      - 'scripts/finalize_audience_resource_pathways_v184.py'
      - 'scripts/publish_start_here_v176.py'
      - 'tests/test_audience_resource_pathways_v184.py'
      - 'tests/test_audience_resource_seo_v184.py'
      - '.github/workflows/validate-audience-resource-pathways-v184.yml'
  push:
    branches: [main]
    paths:
      - 'content/v184/audience-resource-pathways-ar.json'
      - 'scripts/publish_audience_resource_pathways_v184.py'
      - 'scripts/finalize_audience_resource_pathways_v184.py'
      - 'scripts/publish_start_here_v176.py'
      - 'tests/test_audience_resource_pathways_v184.py'
      - 'tests/test_audience_resource_seo_v184.py'
      - '.github/workflows/validate-audience-resource-pathways-v184.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile publishers and tests
        run: >-
          python -m py_compile
          scripts/publish_audience_resource_pathways_v184.py
          scripts/finalize_audience_resource_pathways_v184.py
          tests/test_audience_resource_pathways_v184.py
          tests/test_audience_resource_seo_v184.py
      - name: Run source build safety SEO and idempotence tests
        run: >-
          python -m unittest -v
          tests/test_audience_resource_pathways_v184.py
          tests/test_audience_resource_seo_v184.py
      - name: Build isolated review artifact
        run: |
          mkdir -p artifacts/audience-resources-site/start-here
          printf '<html lang="ar" dir="rtl"><main><h1>الرئيسية</h1></main></html>' > artifacts/audience-resources-site/index.html
          printf '<html lang="ar" dir="rtl"><main><h1>ابدأ من هنا</h1></main><footer></footer></html>' > artifacts/audience-resources-site/start-here/index.html
          printf '<?xml version="1.0" encoding="UTF-8"?><sitemapindex xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"></sitemapindex>' > artifacts/audience-resources-site/sitemap.xml
          python scripts/publish_audience_resource_pathways_v184.py artifacts/audience-resources-site
          python scripts/finalize_audience_resource_pathways_v184.py artifacts/audience-resources-site
      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: audience-resource-pathways-v184
          path: artifacts/audience-resources-site
          if-no-files-found: error
          retention-days: 30
