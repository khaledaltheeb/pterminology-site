name: Inspect production workflow order v194

on:
  pull_request:
    paths:
      - .github/workflows/inspect-production-workflow-order-v194.yml

permissions:
  contents: read

jobs:
  inspect-workflows:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Locate post-gate care-guide rebuilds
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repo = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GH_TOKEN']
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'pterminology-workflow-order-inspector-v194',
          }

          def api(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as response:
                  return json.loads(response.read().decode('utf-8'))

          ref = api(f'https://api.github.com/repos/{repo}/git/ref/heads/main')['object']['sha']
          listing = api(
              f'https://api.github.com/repos/{repo}/contents/.github/workflows?ref={urllib.parse.quote(ref)}'
          )
          markers = [
              'scripts/apply_homepage_v20.py',
              'scripts/publish_care_guides_v21.py',
              'scripts/link_care_guides_v21.py',
              'scripts/enforce_health_publication_gate_v192.py',
              'validated-production-site',
              'actions/upload-pages-artifact',
          ]
          matches = []
          for item in listing:
              if item.get('type') != 'file' or not item['name'].endswith(('.yml', '.yaml')):
                  continue
              payload = api(item['url'] + '&ref=' + urllib.parse.quote(ref) if '?' in item['url'] else item['url'] + '?ref=' + urllib.parse.quote(ref))
              text = base64.b64decode(payload['content']).decode('utf-8')
              found = [marker for marker in markers if marker in text]
              if not found:
                  continue
              lines = text.splitlines()
              snippets = []
              for index, line in enumerate(lines):
                  if any(marker in line for marker in markers):
                      start = max(0, index - 3)
                      end = min(len(lines), index + 4)
                      snippets.append({
                          'line': index + 1,
                          'context': '\n'.join(f'{i + 1}: {lines[i]}' for i in range(start, end)),
                      })
              matches.append({
                  'path': item['path'],
                  'sha': payload['sha'],
                  'markers': found,
                  'snippets': snippets,
              })

          report = {'main_sha': ref, 'workflow_count': len(listing), 'matches': matches}
          Path('production-workflow-order-v194.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: Upload workflow order evidence
        uses: actions/upload-artifact@v4
        with:
          name: production-workflow-order-v194
          path: production-workflow-order-v194.json
          if-no-files-found: error
          retention-days: 7
