name: Validate privacy guide for mental health tools v182

on:
  pull_request:
    branches: [main]
    paths:
      - 'content/v182/privacy-mental-health-tools-ar.json'
      - 'scripts/publish_privacy_mental_health_tools_v182.py'
      - 'tests/test_privacy_mental_health_tools_v182.py'
      - '.github/workflows/validate-privacy-mental-health-tools-v182.yml'
  push:
    branches: [main]
    paths:
      - 'content/v182/privacy-mental-health-tools-ar.json'
      - 'scripts/publish_privacy_mental_health_tools_v182.py'
      - 'tests/test_privacy_mental_health_tools_v182.py'
      - '.github/workflows/validate-privacy-mental-health-tools-v182.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install parser dependency
        run: python -m pip install beautifulsoup4
      - name: Compile publisher and tests
        run: python -m py_compile scripts/publish_privacy_mental_health_tools_v182.py tests/test_privacy_mental_health_tools_v182.py
      - name: Test content safety privacy SEO schema and build
        run: python -m unittest -v tests/test_privacy_mental_health_tools_v182.py
      - name: Build review artifact
        run: python scripts/publish_privacy_mental_health_tools_v182.py artifacts/site
      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: privacy-mental-health-tools-v182
          path: artifacts/site
          if-no-files-found: error
          retention-days: 30
