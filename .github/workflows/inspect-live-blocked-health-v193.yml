name: Inspect live blocked health route v193

on:
  pull_request:
    paths:
      - .github/workflows/inspect-live-blocked-health-v193.yml

permissions:
  contents: read

jobs:
  inspect-live-route:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      BASE_URL: https://khaledaltheeb.github.io/pterminology-site/
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Capture live response evidence
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          base = os.environ['BASE_URL'].rstrip('/') + '/'
          repository = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GH_TOKEN']

          def request(url, *, auth=False):
              headers = {
                  'Cache-Control': 'no-cache',
                  'Pragma': 'no-cache',
                  'User-Agent': 'pterminology-live-inspector-v193',
              }
              if auth:
                  headers.update({
                      'Authorization': f'Bearer {token}',
                      'Accept': 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28',
                  })
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=30) as response:
                      return response.status, response.read(), dict(response.headers)
              except urllib.error.HTTPError as exc:
                  return exc.code, exc.read(), dict(exc.headers)

          _, ref_body, _ = request(
              f'https://api.github.com/repos/{repository}/git/ref/heads/main', auth=True
          )
          current_main = json.loads(ref_body.decode('utf-8'))['object']['sha']
          query = f'?inspect={current_main}'

          paths = {
              'deployment': 'deployment.json',
              'blocked_page': 'care-guides/autism-family-practical-guide/',
              'care_report': 'api/care-guides-v21.json',
              'health_gate': 'api/health-publication-gate-v192.json',
              'care_sitemap': 'sitemap-care-guides.xml',
              'root_sitemap': 'sitemap.xml',
          }
          responses = {}
          raw = {}
          for key, path in paths.items():
              status, body, headers = request(base + path + query)
              text = body.decode('utf-8', errors='replace')
              raw[key] = text
              responses[key] = {
                  'status': status,
                  'content_type': headers.get('Content-Type'),
                  'content_length': len(body),
                  'etag': headers.get('ETag'),
              }

          def parse_json(text):
              try:
                  return json.loads(text)
              except Exception:
                  return {}

          blocked = raw['blocked_page']
          title_match = re.search(r'<title[^>]*>(.*?)</title>', blocked, re.I | re.S)
          canonical_match = re.search(r'<link[^>]+rel=["\']canonical["\'][^>]+href=["\']([^"\']+)', blocked, re.I)
          robots_match = re.search(r'<meta[^>]+name=["\']robots["\'][^>]+content=["\']([^"\']+)', blocked, re.I)
          deployment = parse_json(raw['deployment'])
          care = parse_json(raw['care_report'])
          health = parse_json(raw['health_gate'])
          blocked_token = 'care-guides/autism-family-practical-guide/'
          blocked_title = 'دليل الأسرة العملي لاضطراب طيف التوحد'
          blocked_summary_marker = 'دليل عربي عملي موسع يساعد الأسرة على فهم التوحد'

          report = {
              'verified_at': datetime.now(timezone.utc).isoformat(),
              'current_main': current_main,
              'live_commit': deployment.get('commit'),
              'responses': responses,
              'blocked_page': {
                  'title': title_match.group(1).strip() if title_match else None,
                  'canonical': canonical_match.group(1) if canonical_match else None,
                  'robots': robots_match.group(1) if robots_match else None,
                  'contains_blocked_title': blocked_title in blocked,
                  'contains_blocked_summary': blocked_summary_marker in blocked,
                  'contains_blocked_canonical': blocked_token in (canonical_match.group(1) if canonical_match else ''),
                  'looks_like_actual_blocked_guide': (
                      blocked_title in blocked
                      or blocked_summary_marker in blocked
                      or blocked_token in (canonical_match.group(1) if canonical_match else '')
                  ),
                  'body_prefix': blocked[:2000],
              },
              'care_report': {
                  'needs_specialist_review_published': care.get('needs_specialist_review_published'),
                  'autism_published': care.get('autism_published'),
                  'blocked_review_slugs': care.get('blocked_review_slugs'),
                  'publication_gate_version': care.get('publication_gate_version'),
              },
              'health_gate': {
                  'status': health.get('status'),
                  'blocked_pages_absent': health.get('blocked_pages_absent'),
                  'blocked_pages_removed': health.get('blocked_pages_removed'),
                  'blocked_slugs': health.get('blocked_slugs'),
                  'remaining_blocked_routes': health.get('remaining_blocked_routes'),
              },
              'sitemaps': {
                  'care_contains_blocked_route': blocked_token in raw['care_sitemap'],
                  'root_contains_blocked_route': blocked_token in raw['root_sitemap'],
              },
          }
          Path('live-blocked-health-inspection-v193.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: Upload inspection evidence
        uses: actions/upload-artifact@v4
        with:
          name: live-blocked-health-inspection-v193
          path: live-blocked-health-inspection-v193.json
          if-no-files-found: error
          retention-days: 7
