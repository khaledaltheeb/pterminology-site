name: Validate marshmallow assessment laboratory v12

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-v12:
    runs-on: ubuntu-latest
    env:
      SITE_BASE: https://khaledaltheeb.github.io/pterminology-site/
    steps:
      - uses: actions/checkout@v4
      - name: Reconstruct sources
        run: |
          set -euxo pipefail
          mkdir -p /tmp/v10-content
          cp content/sectors-v10/*.json /tmp/v10-content/
          cat .v10bundle/part00 .v10bundle/part01 .v10bundle/part02 .v10bundle/part03 .v10bundle/part04 | base64 --decode > /tmp/v10.tar.gz
          tar -xzf /tmp/v10.tar.gz
          cp /tmp/v10-content/*.json content/sectors-v10/
          cat .v12bundle/part00 .v12bundle/part01 .v12bundle/part02 .v12bundle/part03 | base64 --decode > /tmp/v12.tar.gz
          sha256sum /tmp/v12.tar.gz
          gzip -t /tmp/v12.tar.gz
          tar -xzf /tmp/v12.tar.gz
      - name: Build complete site
        run: |
          set -euxo pipefail
          cat .generator-v6/part00 .generator-v6/part01 .generator-v6/part02 .generator-v6/part03 > build_site.py
          python scripts/verify_enricher_v7.py
          python scripts/verify_expander_v9.py
          python -m py_compile build_site.py scripts/scale_site_v8.py scripts/design_content_v10.py scripts/apply_contrast_v11.py scripts/expand_v12.py expand_site_v9.py
          node --check content/v12/lab-v12.js
          python build_site.py
          python enrich_site_v7.py
          cp google644f1f7a8b7aaa2b.html _site/google644f1f7a8b7aaa2b.html
          python scripts/scale_site_v8.py
          python expand_site_v9.py
          python scripts/design_content_v10.py
          python scripts/apply_contrast_v11.py _site
          python scripts/expand_v12.py _site
      - name: Verify release contract
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          r=Path('_site')
          report=json.loads((r/'api/build-report-v12.json').read_text())
          expected={'assessment_tools':24,'validated_scales':4,'self_monitoring_tools':20,'cognitive_games':30,'assessment_stages':96,'cognitive_stages':158,'new_indexable_urls':56}
          assert all(report.get(k)==v for k,v in expected.items()), report
          assert len(list((r/'assessment-lab').glob('*/index.html')))==24
          assert len(list((r/'cognitive-lab').glob('*/index.html')))==30
          assert (r/'sitemap-assessment-lab.xml').read_text().count('<url>')==25
          assert (r/'sitemap-cognitive-lab.xml').read_text().count('<url>')==31
          css=(r/'assets/css/marshmallow-v12.css').read_text()
          js=(r/'assets/js/lab-v12.js').read_text()
          assert 'color-scheme: light' in css and '--m12-pink' in css and '--m12-turquoise' in css
          assert all(x in js for x in ('إظهار النتيجة الحالية','حفظ وتوقف','localStorage','showResult'))
          verify=r/'google644f1f7a8b7aaa2b.html'
          assert verify.read_text().strip()=='google-site-verification: google644f1f7a8b7aaa2b.html'
          pages=[p for p in r.rglob('*.html') if p!=verify]
          assert all('marshmallow-v12.css' in p.read_text(errors='ignore') for p in pages)
          assert all('lab-v12.js' in p.read_text(errors='ignore') for p in pages)
          print(report)
          PY
