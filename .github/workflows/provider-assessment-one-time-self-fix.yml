name: Provider Assessment One-Time Self Fix

on:
  push:
    branches:
      - feature/provider-assessment-platform-foundation
    paths:
      - ".github/workflows/provider-assessment-one-time-self-fix.yml"

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout isolated branch
        uses: actions/checkout@v4
        with:
          ref: feature/provider-assessment-platform-foundation
          fetch-depth: 0

      - name: Correct active database validator and workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          validator = Path("provider-assessment-platform/tools/validate_database_active.py")
          text = validator.read_text(encoding="utf-8")
          pattern = re.compile(
              r"        composite_fk_count = len\(\n"
              r"            re\.findall\(\n"
              r".*?"
              r"        require\(composite_fk_count >= 15, f\"Expected composite tenant-case foreign keys, found \{composite_fk_count\}\"\)\n",
              flags=re.DOTALL,
          )
          replacement = '''        composite_fk_count = sum(
              1
              for columns in re.findall(
                  r"FOREIGN\\s+KEY\\s*\\(([^)]*)\\)",
                  sql,
                  flags=re.IGNORECASE | re.DOTALL,
              )
              if "institution_id" in columns and "case_id" in columns
          )
          require(
              composite_fk_count >= 20,
              f"Expected tenant-and-case composite foreign keys, found {composite_fk_count}",
          )
          '''
          updated, count = pattern.subn(replacement, text)
          if count != 1:
              raise SystemExit(f"validator patch expected one match, found {count}")
          validator.write_text(updated, encoding="utf-8")

          workflow = Path(".github/workflows/provider-assessment-database-active.yml")
          workflow_text = workflow.read_text(encoding="utf-8")
          old = 'group: provider-assessment-db-active-${{ github.ref }}-${{ matrix.postgres }}'
          new = 'group: provider-assessment-db-active-${{ github.ref }}'
          if workflow_text.count(old) != 1:
              raise SystemExit("workflow concurrency expression was not found exactly once")
          workflow.write_text(workflow_text.replace(old, new), encoding="utf-8")

          Path(".github/workflows/provider-assessment-one-time-self-fix.yml").unlink()
          PY

      - name: Commit corrected files and remove temporary workflow
        run: |
          git config user.name "provider-assessment-ci"
          git config user.email "provider-assessment-ci@users.noreply.github.com"
          git add provider-assessment-platform/tools/validate_database_active.py
          git add .github/workflows/provider-assessment-database-active.yml
          git add .github/workflows/provider-assessment-one-time-self-fix.yml
          git commit -m "fix: correct active database validation execution"
          git push origin HEAD:feature/provider-assessment-platform-foundation
