name: Provider Assessment Verification Gate

on:
  push:
    branches:
      - feature/provider-assessment-platform-foundation
    paths:
      - "provider-assessment-platform/**"
      - ".github/workflows/provider-assessment-verification-gate.yml"
  pull_request:
    paths:
      - "provider-assessment-platform/**"
      - ".github/workflows/provider-assessment-verification-gate.yml"

permissions:
  contents: read
  issues: write

concurrency:
  group: provider-assessment-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  foundation:
    name: Engine, pathways, prototype, API, static database
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile deterministic engine
        run: python -m compileall -q provider-assessment-platform/engine

      - name: Run unit and pathway safety tests
        run: python provider-assessment-platform/tools/run_tests.py

      - name: Validate governed repository files
        run: python provider-assessment-platform/tools/validate_repository.py

      - name: Validate pathway and catalog cross references
        run: python provider-assessment-platform/tools/validate_cross_references.py

      - name: Validate isolated accessible prototype
        run: python provider-assessment-platform/tools/validate_prototype.py

      - name: Validate active OpenAPI contract
        run: python provider-assessment-platform/tools/validate_api.py

      - name: Validate active database manifest and invariants
        run: python provider-assessment-platform/tools/validate_database_active.py

  postgres15:
    name: PostgreSQL 15 execution and RLS tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: provider_assessment_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d provider_assessment_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Apply PostgreSQL 15 baseline
        env:
          PGPASSWORD: postgres
        run: |
          psql --host 127.0.0.1 --port 5432 --username postgres --dbname provider_assessment_test --set ON_ERROR_STOP=1 --file provider-assessment-platform/database/postgresql.v0.2.0.sql
          psql --host 127.0.0.1 --port 5432 --username postgres --dbname provider_assessment_test --set ON_ERROR_STOP=1 --file provider-assessment-platform/database/tests/rls-smoke-v2.sql

  postgres16:
    name: PostgreSQL 16 execution and RLS tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: provider_assessment_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d provider_assessment_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Apply PostgreSQL 16 baseline
        env:
          PGPASSWORD: postgres
        run: |
          psql --host 127.0.0.1 --port 5432 --username postgres --dbname provider_assessment_test --set ON_ERROR_STOP=1 --file provider-assessment-platform/database/postgresql.v0.2.0.sql
          psql --host 127.0.0.1 --port 5432 --username postgres --dbname provider_assessment_test --set ON_ERROR_STOP=1 --file provider-assessment-platform/database/tests/rls-smoke-v2.sql

  publish-result:
    name: Publish auditable result to Issue 160
    if: always() && github.event_name == 'push'
    needs:
      - foundation
      - postgres15
      - postgres16
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      FOUNDATION_RESULT: ${{ needs.foundation.result }}
      PG15_RESULT: ${{ needs.postgres15.result }}
      PG16_RESULT: ${{ needs.postgres16.result }}
    steps:
      - name: Publish verification result
        run: |
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [ "$FOUNDATION_RESULT" = "success" ] && [ "$PG15_RESULT" = "success" ] && [ "$PG16_RESULT" = "success" ]; then
            overall="PASS"
          else
            overall="FAIL"
          fi

          body=$(cat <<EOF
          ## Provider Assessment Verification Gate — ${overall}

          - Commit: \`${GITHUB_SHA}\`
          - Engine, pathways, prototype, API, static database: **${FOUNDATION_RESULT}**
          - PostgreSQL 15 baseline and RLS smoke tests: **${PG15_RESULT}**
          - PostgreSQL 16 baseline and RLS smoke tests: **${PG16_RESULT}**
          - Run: ${run_url}

          This is a technical verification result using synthetic data. It is not clinical, legal, regulatory, or publisher approval.
          EOF
          )

          gh issue comment 160 --repo "$GITHUB_REPOSITORY" --body "$body"
