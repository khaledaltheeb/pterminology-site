name: Validate complete tips assessments and cognitive sections v15

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-v15:
    runs-on: ubuntu-latest
    env:
      SITE_BASE: https://khaledaltheeb.github.io/pterminology-site/
    steps:
      - uses: actions/checkout@v4
      - name: Restore and compile sources
        run: |
          set -euxo pipefail
          mkdir -p /tmp/v10-content
          cp content/sectors-v10/*.json /tmp/v10-content/
          cat .v10bundle/part00 .v10bundle/part01 .v10bundle/part02 .v10bundle/part03 .v10bundle/part04 | base64 --decode > /tmp/v10.tar.gz
          tar -xzf /tmp/v10.tar.gz
          cp /tmp/v10-content/*.json content/sectors-v10/
          cat .generator-v6/part00 .generator-v6/part01 .generator-v6/part02 .generator-v6/part03 > build_site.py
          python scripts/verify_enricher_v7.py
          python scripts/verify_expander_v9.py
          python -m py_compile build_site.py expand_site_v9.py scripts/scale_site_v8.py scripts/design_content_v10.py scripts/apply_contrast_v11.py scripts/expand_v12_direct.py scripts/rebuild_encyclopedia_v13.py scripts/run_encyclopedia_v13.py scripts/performance_hotfix_v14.py scripts/optimize_site_performance_v14.py scripts/strip_nonlab_runtime_v14.py scripts/finalize_pwa_v14.py scripts/audit_site_integrity_v13.py scripts/verify_performance_v14.py scripts/complete_core_sections_v15.py scripts/verify_core_sections_v15.py
          node --check content/v15/lab-v15.js
          node --check scripts/test_lab_v15.js
      - name: Build full platform
        run: |
          set -euxo pipefail
          python build_site.py
          python enrich_site_v7.py
          cp google644f1f7a8b7aaa2b.html _site/google644f1f7a8b7aaa2b.html
          python scripts/scale_site_v8.py
          python expand_site_v9.py
          python scripts/design_content_v10.py
          python scripts/apply_contrast_v11.py _site
          python scripts/expand_v12_direct.py _site
          python scripts/run_encyclopedia_v13.py _site
          python scripts/performance_hotfix_v14.py _site
          python scripts/optimize_site_performance_v14.py _site
          python scripts/strip_nonlab_runtime_v14.py _site
          python scripts/finalize_pwa_v14.py _site
          python scripts/complete_core_sections_v15.py _site
          python scripts/audit_site_integrity_v13.py _site
      - name: Test every tool and detailed guide
        run: |
          set -euxo pipefail
          node --check _site/assets/js/lab-v12.js
          node scripts/test_lab_v15.js _site
          python scripts/verify_performance_v14.py _site
          python scripts/verify_core_sections_v15.py _site
      - name: Upload v15 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-sections-v15-audit
          path: |
            _site/api/core-sections-v15.json
            _site/api/core-sections-audit-v15.json
            _site/api/performance-verification-v14.json
            _site/api/site-integrity-v13.json
          if-no-files-found: warn
          retention-days: 7
