name: Validate v13 encyclopedia quality rebuild

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-v13:
    runs-on: ubuntu-latest
    env:
      SITE_BASE: https://khaledaltheeb.github.io/pterminology-site/
    steps:
      - uses: actions/checkout@v4

      - name: Restore legacy sources
        run: |
          set -euxo pipefail
          mkdir -p /tmp/v10-content
          cp content/sectors-v10/*.json /tmp/v10-content/
          cat .v10bundle/part00 .v10bundle/part01 .v10bundle/part02 .v10bundle/part03 .v10bundle/part04 | base64 --decode > /tmp/v10.tar.gz
          tar -xzf /tmp/v10.tar.gz
          cp /tmp/v10-content/*.json content/sectors-v10/

      - name: Compile generators
        run: |
          set -euxo pipefail
          cat .generator-v6/part00 .generator-v6/part01 .generator-v6/part02 .generator-v6/part03 > build_site.py
          python scripts/verify_enricher_v7.py
          python scripts/verify_expander_v9.py
          python -m py_compile build_site.py scripts/scale_site_v8.py scripts/design_content_v10.py scripts/apply_contrast_v11.py scripts/expand_v12_direct.py scripts/rebuild_encyclopedia_v13.py expand_site_v9.py
          node --check content/v12-direct/lab-v12.js

      - name: Build complete site and replace encyclopedia
        run: |
          set -euxo pipefail
          python build_site.py
          python enrich_site_v7.py
          cp google644f1f7a8b7aaa2b.html _site/google644f1f7a8b7aaa2b.html
          python scripts/scale_site_v8.py
          python expand_site_v9.py
          python scripts/design_content_v10.py
          python scripts/apply_contrast_v11.py _site
          python scripts/expand_v12_direct.py _site
          python scripts/rebuild_encyclopedia_v13.py _site | tee /tmp/v13-build.log

      - name: Audit every encyclopedia page
        run: |
          python - <<'PY'
          import hashlib
          import json
          import re
          from collections import Counter
          from pathlib import Path

          root=Path('_site')
          pages=sorted((root/'encyclopedia').glob('concept-*/index.html'))
          hubs=sorted((root/'hubs').glob('*/index.html'))
          report=json.loads((root/'api/encyclopedia-audit-v13.json').read_text(encoding='utf-8'))
          audit={'report':report,'page_count':len(pages),'hub_count':len(hubs),'errors':[]}
          if len(pages)!=2000: audit['errors'].append(f'page_count={len(pages)}')
          if len(hubs)!=200: audit['errors'].append(f'hub_count={len(hubs)}')
          if report.get('unique_article_hashes')!=2000: audit['errors'].append('article hashes not unique')
          if report.get('unique_titles')!=2000: audit['errors'].append('titles not unique')
          if report.get('unique_descriptions')!=2000: audit['errors'].append('descriptions not unique')
          if report.get('minimum_article_characters',0)<1800: audit['errors'].append('article too short')
          if not report.get('old_boilerplate_removed'): audit['errors'].append('old boilerplate remains')

          titles=[]; descriptions=[]; hashes=set(); paragraphs=Counter()
          for page in pages:
              text=page.read_text(encoding='utf-8')
              rel=str(page.relative_to(root))
              checks={
                  'h1':text.count('<h1>')==1,
                  'article':text.count('data-v13-article="1"')==1,
                  'main':text.count('<main class="ency-v13"')==1,
                  'canonical':'rel="canonical"' in text,
                  'schema':'application/ld+json' in text,
                  'viewport':'name="viewport"' in text,
                  'v13_css':'encyclopedia-v13.css' in text,
                  'v12_css':'marshmallow-v12.css' in text,
                  'sources':'مصادر رسمية للمراجعة' in text,
                  'old_phrase':'يتناول هذا المدخل' not in text,
              }
              bad=[k for k,v in checks.items() if not v]
              if bad: audit['errors'].append(f'{rel}: {bad}')
              title=re.search(r'<title>(.*?)</title>',text,re.S)
              desc=re.search(r'<meta name="description" content="(.*?)">',text,re.S)
              article=re.search(r'<article class="ency-v13__article"[^>]*>(.*?)</article>',text,re.S)
              if not (title and desc and article):
                  audit['errors'].append(f'{rel}: missing title/description/article')
                  continue
              titles.append(title.group(1));descriptions.append(desc.group(1))
              plain=re.sub(r'<[^>]+>',' ',article.group(1));plain=re.sub(r'\s+',' ',plain).strip()
              if len(plain)<1800: audit['errors'].append(f'{rel}: {len(plain)} chars')
              digest=hashlib.sha256(plain.encode()).hexdigest()
              if digest in hashes: audit['errors'].append(f'{rel}: duplicate article')
              hashes.add(digest)
              for paragraph in re.findall(r'<p[^>]*>(.*?)</p>',article.group(1),re.S):
                  p=re.sub(r'<[^>]+>',' ',paragraph);p=re.sub(r'\s+',' ',p).strip()
                  if len(p)>=180: paragraphs[p]+=1
          if len(set(titles))!=2000: audit['errors'].append('duplicate titles')
          if len(set(descriptions))!=2000: audit['errors'].append('duplicate descriptions')
          repeated={p:c for p,c in paragraphs.items() if c>25}
          if repeated: audit['errors'].append(f'repeated long paragraphs={len(repeated)}')
          if 'يتناول هذا المدخل' in ''.join(p.read_text(encoding='utf-8') for p in pages[:20]):
              audit['errors'].append('legacy boilerplate detected')
          if (root/'sitemap-terms-1.xml').read_text().count('<url>')!=1000: audit['errors'].append('sitemap terms 1 count')
          if (root/'sitemap-terms-2.xml').read_text().count('<url>')!=1000: audit['errors'].append('sitemap terms 2 count')
          if (root/'sitemap-hubs.xml').read_text().count('<url>')!=201: audit['errors'].append('sitemap hubs count')
          verify=root/'google644f1f7a8b7aaa2b.html'
          if verify.read_text(encoding='utf-8').strip()!='google-site-verification: google644f1f7a8b7aaa2b.html': audit['errors'].append('Google verification changed')
          Path('/tmp/v13-audit.json').write_text(json.dumps(audit,ensure_ascii=False,indent=2),encoding='utf-8')
          print(json.dumps(audit,ensure_ascii=False,indent=2))
          if audit['errors']:
              raise SystemExit('\n'.join(audit['errors'][:30]))
          PY

      - name: Upload v13 audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v13-encyclopedia-audit
          path: |
            /tmp/v13-audit.json
            /tmp/v13-build.log
          if-no-files-found: warn
          retention-days: 7
