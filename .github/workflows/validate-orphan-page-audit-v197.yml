name: Validate orphan and sitemap coverage v197

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/audit_orphan_pages_v197.py'
      - 'tests/test_orphan_page_audit_v197.py'
      - '.github/workflows/validate-orphan-page-audit-v197.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile audit and tests
        run: python -m py_compile scripts/audit_orphan_pages_v197.py tests/test_orphan_page_audit_v197.py
      - name: Run synthetic orphan and sitemap contracts
        run: python -m unittest -v tests/test_orphan_page_audit_v197.py
