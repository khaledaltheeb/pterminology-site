name: Validate every assessment and cognitive tool v24

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  exhaustive-labs:
    runs-on: ubuntu-latest
    env:
      SITE_BASE: https://khaledaltheeb.github.io/pterminology-site/
    steps:
      - uses: actions/checkout@v4
      - name: Restore and compile production sources
        run: |
          set -euxo pipefail
          mkdir -p /tmp/v10-content
          cp content/sectors-v10/*.json /tmp/v10-content/
          cat .v10bundle/part00 .v10bundle/part01 .v10bundle/part02 .v10bundle/part03 .v10bundle/part04 | base64 --decode > /tmp/v10.tar.gz
          tar -xzf /tmp/v10.tar.gz
          cp /tmp/v10-content/*.json content/sectors-v10/
          cat .generator-v6/part00 .generator-v6/part01 .generator-v6/part02 .generator-v6/part03 > build_site.py
          python -m py_compile scripts/audit_all_labs_v22.py scripts/upgrade_cognitive_batch1_v22.py scripts/upgrade_cognitive_batch2_v22.py scripts/fix_stroop_and_variation_v23.py scripts/complete_cognitive_remaining_v24.py
          node --check scripts/e2e_all_labs_v22.mjs
          node --check scripts/test_cognitive_variation_v23.mjs
          node --check scripts/test_cognitive_variation_v24.mjs
      - name: Build exact production output
        run: |
          set -euxo pipefail
          python build_site.py
          python enrich_site_v7.py
          cp google644f1f7a8b7aaa2b.html _site/google644f1f7a8b7aaa2b.html
          python scripts/scale_site_v8.py
          python expand_site_v9.py
          python scripts/design_content_v10.py
          python scripts/apply_contrast_v11.py _site
          python scripts/expand_v12_direct.py _site
          python scripts/run_encyclopedia_v13.py
          python scripts/performance_hotfix_v14.py _site
          python scripts/optimize_site_performance_v14.py _site
          python scripts/strip_nonlab_runtime_v14.py _site
          python scripts/finalize_pwa_v14.py _site
          python scripts/complete_core_sections_v15.py _site
          python scripts/upgrade_cognitive_batch1_v22.py _site
          python scripts/upgrade_cognitive_batch2_v22.py _site
          python scripts/fix_stroop_and_variation_v23.py _site
          python scripts/complete_cognitive_remaining_v24.py _site
          node --check _site/assets/js/lab-v12.js
          node scripts/test_cognitive_variation_v23.mjs _site/assets/js/lab-v12.js | tee _site/api/cognitive-variation-v23.json
          node scripts/test_cognitive_variation_v24.mjs _site
          python scripts/apply_homepage_v20.py _site
          python scripts/publish_care_guides_v21.py _site
          python scripts/link_care_guides_v21.py _site
          python scripts/polish_site_v16.py _site
          python scripts/audit_site_integrity_v13.py _site
      - name: Audit definitions, names, repetition, depth and scoring contracts
        run: python scripts/audit_all_labs_v22.py _site
      - name: Install real browser runtime
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Complete all 88 tools on mobile and desktop
        run: |
          set -euxo pipefail
          mkdir -p preview
          ln -s "$PWD/_site" preview/pterminology-site
          python -m http.server 8000 --directory preview >/tmp/all-labs-v24-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          for i in $(seq 1 30); do curl -fsS http://127.0.0.1:8000/pterminology-site/ >/dev/null && break; sleep 1; done
          AUDIT_BASE_URL=http://127.0.0.1:8000/pterminology-site/ AUDIT_OUT_DIR=_site/api node scripts/e2e_all_labs_v22.mjs
      - name: Enforce complete pass counts
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          static=json.loads(Path('_site/api/all-labs-v22.json').read_text())
          b1=json.loads(Path('_site/api/cognitive-batch1-v22.json').read_text())
          b2=json.loads(Path('_site/api/cognitive-batch2-v22.json').read_text())
          fix=json.loads(Path('_site/api/stroop-variation-v23.json').read_text())
          oldvar=json.loads(Path('_site/api/cognitive-variation-v23.json').read_text())
          complete=json.loads(Path('_site/api/cognitive-complete-v24.json').read_text())
          variation=json.loads(Path('_site/api/cognitive-variation-v24.json').read_text())
          e2e=json.loads(Path('_site/api/all-labs-e2e-v22.json').read_text())
          assert b1['count']==10 and b2['count']==10
          assert fix['ink_rendered_inline'] and fix['metadata_declared'],fix
          assert oldvar['failures']==[],oldvar
          assert complete['completed']==48 and complete['remaining']==0 and complete['batch3_to_5_count']==28,complete
          assert variation['tools']==48 and variation['errorCount']==0,variation
          assert static['assessment_count']==40 and static['cognitive_count']==48 and static['error_count']==0,static
          assert e2e['expectedRuns']==176 and e2e['completedRuns']==176 and e2e['passedRuns']==176 and e2e['failedRuns']==0 and e2e['errorCount']==0,e2e
          print({'cognitive':'48/48','stroop':'passed','variation':'passed','static':'88/88','browser':'176/176','status':'passed'})
          PY
      - name: Upload per-tool evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-labs-v24
          path: |
            _site/api/cognitive-batch1-v22.json
            _site/api/cognitive-batch2-v22.json
            _site/api/stroop-variation-v23.json
            _site/api/cognitive-variation-v23.json
            _site/api/cognitive-complete-v24.json
            _site/api/cognitive-variation-v24.json
            _site/api/all-labs-v22.json
            _site/api/all-labs-e2e-v22.json
            /tmp/all-labs-v24-http.log
          if-no-files-found: warn
          retention-days: 14
