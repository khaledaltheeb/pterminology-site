name: One-time semantic care-guide linker switch v201

on:
  push:
    branches:
      - agent/platform-content-recovery-v201
    paths:
      - ".github/workflows/one-time-care-guide-linker-v201.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  switch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/platform-content-recovery-v201
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Switch publisher call
        run: |
          python - <<'PY'
          from pathlib import Path
          path=Path('scripts/apply_homepage_v20.py')
          text=path.read_text(encoding='utf-8')
          old='run_publisher("link_care_guides_v21.py")'
          new='run_publisher("link_care_guides_v201.py")'
          if old not in text and new not in text:
              raise SystemExit('Expected care-guide linker call not found')
          path.write_text(text.replace(old,new,1),encoding='utf-8')
          PY
          python -m py_compile scripts/apply_homepage_v20.py scripts/link_care_guides_v201.py
          grep -q 'link_care_guides_v201.py' scripts/apply_homepage_v20.py
      - name: Commit switch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/apply_homepage_v20.py
          git diff --cached --quiet && exit 0
          git commit -m "Publishing: use semantic care-guide linker v201"
          git push origin HEAD:agent/platform-content-recovery-v201
