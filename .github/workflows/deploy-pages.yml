name: Deploy marshmallow Arabic psychology laboratory v12

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-validate-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      SITE_BASE: https://khaledaltheeb.github.io/pterminology-site/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reconstruct v10 sources and restore verified UTF-8 content
        run: |
          set -euxo pipefail
          mkdir -p /tmp/v10-content
          cp content/sectors-v10/family.json /tmp/v10-content/family.json
          cp content/sectors-v10/child.json /tmp/v10-content/child.json
          cp content/sectors-v10/home.json /tmp/v10-content/home.json
          cp content/sectors-v10/women.json /tmp/v10-content/women.json
          cp content/sectors-v10/tips.json /tmp/v10-content/tips.json
          cat .v10bundle/part00 .v10bundle/part01 .v10bundle/part02 .v10bundle/part03 .v10bundle/part04 | base64 --decode > /tmp/v10-source.tar.gz
          tar -xzf /tmp/v10-source.tar.gz
          cp /tmp/v10-content/*.json content/sectors-v10/

      - name: Reconstruct and structurally verify v12 sources
        run: |
          set -euxo pipefail
          cat .v12bundle/part00 .v12bundle/part01 .v12bundle/part02 .v12bundle/part03 | base64 --decode > /tmp/v12-source.tar.gz
          sha256sum /tmp/v12-source.tar.gz
          gzip -t /tmp/v12-source.tar.gz
          tar -tzf /tmp/v12-source.tar.gz >/tmp/v12-file-list.txt
          test "$(wc -l </tmp/v12-file-list.txt)" -ge 9
          tar -xzf /tmp/v12-source.tar.gz
          python - <<'PY'
          import json
          from pathlib import Path
          root=Path('content/v12')
          files=sorted(root.glob('assessments-*.json'))+[root/'games-v12.json']
          for path in files:
              payload=json.loads(path.read_text(encoding='utf-8'))
              assert payload['count']==len(payload['items']), path
              print(path, payload['count'])
          PY

      - name: Reconstruct and compile every generator
        run: |
          set -euxo pipefail
          cat .generator-v6/part00 .generator-v6/part01 .generator-v6/part02 .generator-v6/part03 > build_site.py
          python scripts/verify_enricher_v7.py
          python scripts/verify_expander_v9.py
          python -m py_compile build_site.py scripts/scale_site_v8.py scripts/design_content_v10.py scripts/apply_contrast_v11.py scripts/expand_v12.py expand_site_v9.py
          node --check content/v12/lab-v12.js

      - name: Build complete site and apply v12
        run: |
          set -euxo pipefail
          python build_site.py
          python enrich_site_v7.py
          cp google644f1f7a8b7aaa2b.html _site/google644f1f7a8b7aaa2b.html
          python scripts/scale_site_v8.py
          python expand_site_v9.py
          python scripts/design_content_v10.py
          python scripts/apply_contrast_v11.py _site
          python scripts/expand_v12.py _site

      - name: Validate content, pastel theme, results, mobile metadata and sitemaps
        run: |
          set -euo pipefail
          test "$(find _site/encyclopedia -mindepth 2 -name index.html | wc -l)" -eq 2000
          test "$(find _site/assessment-lab -mindepth 2 -name index.html | wc -l)" -eq 24
          test "$(find _site/cognitive-lab -mindepth 2 -name index.html | wc -l)" -eq 30
          test "$(grep -o '<url>' _site/sitemap-assessment-lab.xml | wc -l)" -eq 25
          test "$(grep -o '<url>' _site/sitemap-cognitive-lab.xml | wc -l)" -eq 31
          grep -q 'sitemap-assessment-lab.xml' _site/sitemap.xml
          grep -q 'sitemap-cognitive-lab.xml' _site/sitemap.xml
          grep -q 'v12 — Marshmallow light system' _site/assets/css/marshmallow-v12.css
          grep -q 'multi-stage assessment engine' _site/assets/js/lab-v12.js
          grep -q 'color-scheme: light' _site/assets/css/marshmallow-v12.css
          grep -q 'إظهار النتيجة الحالية' _site/assets/js/lab-v12.js
          grep -q 'حفظ وتوقف' _site/assets/js/lab-v12.js
          grep -q 'data-v12-lab="assessment"' _site/assessment-lab/phq-9-plus/index.html
          grep -q 'data-v12-lab="cognitive"' _site/cognitive-lab/simple-reaction/index.html
          grep -q 'width=device-width' _site/assessment-lab/index.html
          grep -q '"display": "standalone"' _site/manifest.webmanifest
          grep -q 'google-site-verification: google644f1f7a8b7aaa2b.html' _site/google644f1f7a8b7aaa2b.html
          python - <<'PY'
          import json
          from pathlib import Path
          root=Path('_site')
          report=json.loads((root/'api/build-report-v12.json').read_text(encoding='utf-8'))
          assert report['assessment_tools']==24, report
          assert report['validated_scales']==4, report
          assert report['self_monitoring_tools']==20, report
          assert report['cognitive_games']==30, report
          assert report['assessment_stages']==96, report
          assert report['cognitive_stages']==158, report
          assert report['new_indexable_urls']==56, report
          verification=root/'google644f1f7a8b7aaa2b.html'
          content=[p for p in root.rglob('*.html') if p!=verification]
          missing_css=[str(p.relative_to(root)) for p in content if 'marshmallow-v12.css' not in p.read_text(encoding='utf-8',errors='ignore')]
          missing_js=[str(p.relative_to(root)) for p in content if 'lab-v12.js' not in p.read_text(encoding='utf-8',errors='ignore')]
          assert not missing_css, missing_css[:10]
          assert not missing_js, missing_js[:10]
          assessment_pages=list((root/'assessment-lab').glob('*/index.html'))
          cognitive_pages=list((root/'cognitive-lab').glob('*/index.html'))
          assert all('lab-definition' in p.read_text(encoding='utf-8') and 'result-card' in p.read_text(encoding='utf-8') for p in assessment_pages+cognitive_pages)
          print(report)
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload verified site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy verified site
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Submit all sitemap URLs to IndexNow
        continue-on-error: true
        run: |
          python - <<'PY'
          import json, urllib.request, xml.etree.ElementTree as ET
          from pathlib import Path
          base='https://khaledaltheeb.github.io/pterminology-site/'
          key='a4f9d7c2e81b4630b5d6f7a912ce3048'
          ns={'s':'http://www.sitemaps.org/schemas/sitemap/0.9'}
          idx=ET.parse('_site/sitemap.xml').getroot()
          maps=[n.text.rsplit('/',1)[-1] for n in idx.findall('s:sitemap/s:loc',ns) if n.text]
          urls=[]
          for name in maps:
              tree=ET.parse(Path('_site')/name).getroot()
              urls.extend(n.text for n in tree.findall('s:url/s:loc',ns) if n.text)
          for start in range(0,len(urls),10000):
              payload={'host':'khaledaltheeb.github.io','key':key,'keyLocation':base+key+'.txt','urlList':urls[start:start+10000]}
              req=urllib.request.Request('https://api.indexnow.org/indexnow',data=json.dumps(payload).encode(),headers={'Content-Type':'application/json; charset=utf-8'},method='POST')
              with urllib.request.urlopen(req,timeout=30) as response:
                  print('IndexNow',response.status,len(payload['urlList']))
          PY
