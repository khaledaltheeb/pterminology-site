name: Deploy verified Arabic psychology knowledge hub v7

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify-build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reconstruct and compile v6 base generator
        run: |
          set -euo pipefail
          cat \
            .generator-v6/part00 \
            .generator-v6/part01 \
            .generator-v6/part02 \
            .generator-v6/part03 \
            > build_site.py
          python -m py_compile build_site.py

      - name: Verify v7 enricher cryptographically
        run: |
          set -euo pipefail
          python scripts/verify_enricher_v7.py

      - name: Build and enrich complete static site
        env:
          SITE_BASE: https://khaledaltheeb.github.io/pterminology-site/
        run: |
          set -euo pipefail
          python build_site.py
          python enrich_site_v7.py
          cp google644f1f7a8b7aaa2b.html _site/google644f1f7a8b7aaa2b.html

      - name: Validate v7 release contract and Google ownership file
        run: |
          set -euo pipefail

          test -f _site/index.html
          test -f _site/404.html
          test -f _site/sitemap.xml
          test -f _site/robots.txt
          test -f _site/feed.xml
          test -f _site/manifest.webmanifest
          test -f _site/opensearch.xml
          test -f _site/service-worker.js
          test -f _site/api/terms.json
          test -f _site/api/search-index.json
          test -f _site/llms.txt
          test -f _site/data.json
          test -f _site/.well-known/security.txt
          test -f _site/a4f9d7c2e81b4630b5d6f7a912ce3048.txt
          test -f _site/google644f1f7a8b7aaa2b.html

          GOOGLE_VERIFY_SHA="$(sha256sum _site/google644f1f7a8b7aaa2b.html | awk '{print $1}')"
          test "$GOOGLE_VERIFY_SHA" = "22ef11f164b24ac4397a1ef64641ef2e6fb860eaf040102e30c56ac36b032ecf"
          grep -qx 'google-site-verification: google644f1f7a8b7aaa2b.html' _site/google644f1f7a8b7aaa2b.html
          test ! -e '_site/google644f1f7a8b7aaa2b(2).html'

          TERM_PAGES="$(find _site/terms -mindepth 2 -name index.html | wc -l)"
          GUIDE_PAGES="$(find _site/guides -mindepth 2 -name index.html | wc -l)"
          CATEGORY_PAGES="$(find _site/categories -mindepth 2 -name index.html | wc -l)"
          ARABIC_LETTER_PAGES="$(find _site/letters -mindepth 2 -name index.html | wc -l)"
          ENGLISH_LETTER_PAGES="$(find _site/english-index -mindepth 2 -name index.html | wc -l)"
          TOOL_PAGES="$(find _site/tools -mindepth 2 -name index.html | wc -l)"
          SITEMAP_URLS="$(grep -o '<url>' _site/sitemap.xml | wc -l)"

          test "$TERM_PAGES" -eq 200
          test "$GUIDE_PAGES" -eq 20
          test "$CATEGORY_PAGES" -ge 15
          test "$ARABIC_LETTER_PAGES" -ge 20
          test "$ENGLISH_LETTER_PAGES" -ge 20
          test "$TOOL_PAGES" -eq 4
          test "$SITEMAP_URLS" -ge 295

          test -f _site/tools/compare/index.html
          test -f _site/tools/quiz/index.html
          test -f _site/tools/daily-term/index.html
          test -f _site/tools/favorites/index.html
          test -f _site/stats/index.html
          test -f _site/downloads/index.html
          test -f _site/downloads/psychology-terms-ar.json
          test -f _site/downloads/psychology-terms-ar.csv
          test -f _site/downloads/psychology-terms-ar.tsv
          test -f _site/citation/index.html
          test -f _site/media-kit/index.html

          grep -q 'افهم المصطلح، لا تكتفِ باسمه' _site/index.html
          grep -q 'استكشف بطرق مختلفة' _site/index.html
          grep -q 'application/ld+json' _site/index.html
          grep -q 'rel="canonical"' _site/index.html
          grep -q 'hreflang="ar"' _site/index.html
          grep -q 'https://khaledaltheeb.github.io/pterminology-site/sitemap.xml' _site/robots.txt
          grep -q '"count":200' _site/api/terms.json
          grep -q 'pterminology-v7-' _site/service-worker.js

          if grep -q 'شارك الحساب' _site/index.html; then
            echo 'Rejected sharing section reappeared.' >&2
            exit 1
          fi

          if grep -q 'تنبيه مهني' _site/index.html; then
            echo 'Rejected disclaimer heading reappeared.' >&2
            exit 1
          fi

          echo "Validated v7 and Google ownership file: $TERM_PAGES terms, $GUIDE_PAGES guides, $CATEGORY_PAGES categories, $ARABIC_LETTER_PAGES Arabic letters, $ENGLISH_LETTER_PAGES English letters, $TOOL_PAGES interactive tools and $SITEMAP_URLS URLs."

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload verified site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy verified site
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Submit all indexable URLs to IndexNow
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          import urllib.request
          import xml.etree.ElementTree as ET

          base = "https://khaledaltheeb.github.io/pterminology-site/"
          key = "a4f9d7c2e81b4630b5d6f7a912ce3048"
          namespace = {"s": "http://www.sitemaps.org/schemas/sitemap/0.9"}
          sitemap = ET.parse("_site/sitemap.xml").getroot()
          urls = [
              node.text
              for node in sitemap.findall("s:url/s:loc", namespace)
              if node.text
          ]

          payload = {
              "host": "khaledaltheeb.github.io",
              "key": key,
              "keyLocation": base + key + ".txt",
              "urlList": urls,
          }
          request = urllib.request.Request(
              "https://api.indexnow.org/indexnow",
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json; charset=utf-8"},
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              print("IndexNow status:", response.status, "URLs:", len(urls))
          PY
