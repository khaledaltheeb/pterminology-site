name: Deploy luminous Arabic psychology mega-library v10

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-validate-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reconstruct v10 source bundle
        run: |
          set -euo pipefail
          cat .v10bundle/part00 .v10bundle/part01 .v10bundle/part02 .v10bundle/part03 .v10bundle/part04 | base64 --decode > /tmp/v10-source.tar.gz
          tar -xzf /tmp/v10-source.tar.gz
          python -m py_compile scripts/design_content_v10.py

      - name: Reconstruct and verify all generators
        run: |
          set -euo pipefail
          cat .generator-v6/part00 .generator-v6/part01 .generator-v6/part02 .generator-v6/part03 > build_site.py
          python -m py_compile build_site.py
          python scripts/verify_enricher_v7.py
          python -m py_compile scripts/scale_site_v8.py
          python scripts/verify_expander_v9.py
          python -m py_compile expand_site_v9.py
          python -m py_compile scripts/design_content_v10.py

      - name: Build complete v10 site
        env:
          SITE_BASE: https://khaledaltheeb.github.io/pterminology-site/
        run: |
          set -euo pipefail
          python build_site.py
          python enrich_site_v7.py
          cp google644f1f7a8b7aaa2b.html _site/google644f1f7a8b7aaa2b.html
          python scripts/scale_site_v8.py
          python expand_site_v9.py
          python scripts/design_content_v10.py

      - name: Validate design, sectors, content and sitemap index
        run: |
          set -euo pipefail
          test "$(find _site/encyclopedia -mindepth 2 -name index.html | wc -l)" -eq 2000
          test "$(find _site/hubs -mindepth 2 -name index.html | wc -l)" -eq 200
          test "$(find _site/assessments -mindepth 2 -name index.html | wc -l)" -eq 3
          test "$(find _site/cognitive-tests -mindepth 2 -name index.html | wc -l)" -eq 8
          test "$(find _site/comparisons -mindepth 2 -name index.html | wc -l)" -eq 100
          test "$(find _site/guided-assessment -mindepth 2 -name index.html | wc -l)" -eq 100
          test "$(find _site/library -mindepth 3 -name index.html | wc -l)" -eq 60
          test "$(find _site/sectors -mindepth 3 -name index.html | wc -l)" -eq 80
          test "$(find _site/sectors -mindepth 2 -maxdepth 2 -name index.html | wc -l)" -eq 4
          test "$(find _site/tips -mindepth 2 -name index.html | wc -l)" -eq 20
          test -f _site/assets/css/theme-v10.css
          test -f _site/assets/js/app-v10.js
          test -f _site/assets/logo.svg
          test -f _site/assets/logo-mark.svg
          test "$(find _site/assets/illustrations -name '*.svg' | wc -l)" -eq 5
          test -f _site/api/sectors-v10.json
          test -f _site/api/tips-v10.json
          test -f _site/api/build-report-v10.json
          test -f _site/downloads/sector-guides-v10.csv
          grep -q '<sitemapindex' _site/sitemap.xml
          grep -q 'sitemap-sectors.xml' _site/sitemap.xml
          grep -q 'sitemap-tips.xml' _site/sitemap.xml
          test "$(grep -o '<url>' _site/sitemap-sectors.xml | wc -l)" -eq 84
          test "$(grep -o '<url>' _site/sitemap-tips.xml | wc -l)" -eq 21
          grep -q 'theme-v10.css' _site/index.html
          grep -q 'مصطلحات علم النفس' _site/assets/logo.svg
          grep -q 'الصحة النفسية للأسرة' _site/sectors/family/index.html
          grep -q 'الصحة النفسية للطفل' _site/sectors/child/index.html
          grep -q 'الصحة النفسية للمرأة' _site/sectors/women/index.html
          grep -q 'الصحة النفسية للعائلة' _site/sectors/home/index.html
          grep -q 'نصائح نفسية عملية' _site/tips/index.html
          grep -q 'google-site-verification: google644f1f7a8b7aaa2b.html' _site/google644f1f7a8b7aaa2b.html
          python - <<'PY'
          import json, pathlib, xml.etree.ElementTree as ET
          root=pathlib.Path('_site')
          r=json.loads((root/'api/build-report-v10.json').read_text(encoding='utf-8'))
          assert r['sector_articles']==80
          assert r['tip_guides']==20
          assert r['practical_tips']==120
          assert r['new_indexable_urls']==105
          s=json.loads((root/'api/sectors-v10.json').read_text(encoding='utf-8'))
          t=json.loads((root/'api/tips-v10.json').read_text(encoding='utf-8'))
          assert s['count']==80 and len(s['items'])==80
          assert len({x['url'] for x in s['items']})==80
          assert t['guide_count']==20 and t['tip_count']==120
          idx=ET.parse(root/'sitemap.xml').getroot()
          assert idx.tag.endswith('sitemapindex')
          html=list(root.rglob('*.html'))
          styled=sum('theme-v10.css' in p.read_text(encoding='utf-8',errors='ignore') for p in html)
          assert styled==len(html), (styled,len(html))
          print(r)
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload verified site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy verified site
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Submit all sitemap URLs to IndexNow
        continue-on-error: true
        run: |
          python - <<'PY'
          import json, urllib.request, xml.etree.ElementTree as ET
          from pathlib import Path
          base='https://khaledaltheeb.github.io/pterminology-site/'
          key='a4f9d7c2e81b4630b5d6f7a912ce3048'
          ns={'s':'http://www.sitemaps.org/schemas/sitemap/0.9'}
          idx=ET.parse('_site/sitemap.xml').getroot()
          maps=[n.text.rsplit('/',1)[-1] for n in idx.findall('s:sitemap/s:loc',ns) if n.text]
          urls=[]
          for name in maps:
              tree=ET.parse(Path('_site')/name).getroot()
              urls.extend(n.text for n in tree.findall('s:url/s:loc',ns) if n.text)
          for start in range(0,len(urls),10000):
              payload={'host':'khaledaltheeb.github.io','key':key,'keyLocation':base+key+'.txt','urlList':urls[start:start+10000]}
              req=urllib.request.Request('https://api.indexnow.org/indexnow',data=json.dumps(payload).encode(),headers={'Content-Type':'application/json; charset=utf-8'},method='POST')
              with urllib.request.urlopen(req,timeout=30) as response: print('IndexNow',response.status,len(payload['urlList']))
          PY
