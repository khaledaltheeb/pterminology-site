name: Deploy Arabic psychology mega-library v9

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-validate-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reconstruct and verify all generators
        run: |
          set -euo pipefail
          cat .generator-v6/part00 .generator-v6/part01 .generator-v6/part02 .generator-v6/part03 > build_site.py
          python -m py_compile build_site.py
          python scripts/verify_enricher_v7.py
          python -m py_compile scripts/scale_site_v8.py
          python scripts/verify_expander_v9.py
          python -m py_compile expand_site_v9.py

      - name: Build complete v9 site
        env:
          SITE_BASE: https://khaledaltheeb.github.io/pterminology-site/
        run: |
          set -euo pipefail
          python build_site.py
          python enrich_site_v7.py
          cp google644f1f7a8b7aaa2b.html _site/google644f1f7a8b7aaa2b.html
          python scripts/scale_site_v8.py
          python expand_site_v9.py

      - name: Validate encyclopedia, assessments and sitemap index
        run: |
          set -euo pipefail
          test "$(find _site/encyclopedia -mindepth 2 -name index.html | wc -l)" -eq 2000
          test "$(find _site/hubs -mindepth 2 -name index.html | wc -l)" -eq 200
          test "$(find _site/assessments -mindepth 2 -name index.html | wc -l)" -eq 3
          test "$(find _site/cognitive-tests -mindepth 2 -name index.html | wc -l)" -eq 8
          test "$(find _site/comparisons -mindepth 2 -name index.html | wc -l)" -eq 100
          test "$(find _site/guided-assessment -mindepth 2 -name index.html | wc -l)" -eq 100
          test "$(find _site/library -mindepth 3 -name index.html | wc -l)" -eq 60
          test "$(grep -o '<url>' _site/sitemap-terms-1.xml | wc -l)" -eq 1000
          test "$(grep -o '<url>' _site/sitemap-terms-2.xml | wc -l)" -eq 1000
          grep -q '<sitemapindex' _site/sitemap.xml
          grep -q 'sitemap-assessments.xml' _site/sitemap.xml
          grep -q 'sitemap-cognitive.xml' _site/sitemap.xml
          grep -q 'sitemap-comparisons.xml' _site/sitemap.xml
          grep -q 'sitemap-guided-assessment.xml' _site/sitemap.xml
          grep -q 'sitemap-academic-library.xml' _site/sitemap.xml
          grep -q 'PHQ-9' _site/assessments/phq-9/index.html
          grep -q 'GAD-7' _site/assessments/gad-7/index.html
          grep -q 'WHO-5' _site/assessments/who-5/index.html
          grep -q 'ليست درجة IQ سريرية' _site/cognitive-tests/index.html
          grep -q 'أداة فحص وليست تشخيصًا' _site/assessments/phq-9/index.html
          grep -q 'google-site-verification: google644f1f7a8b7aaa2b.html' _site/google644f1f7a8b7aaa2b.html
          python - <<'PY'
          import json, xml.etree.ElementTree as ET
          from pathlib import Path
          r=Path('_site')
          v8=json.loads((r/'api/build-report-v8.json').read_text(encoding='utf-8'))
          v9=json.loads((r/'api/build-report-v9.json').read_text(encoding='utf-8'))
          assert v8['concepts']==2000 and v8['hubs']==200
          assert v9['validated_assessment_pages']==3
          assert v9['cognitive_test_pages']==8
          assert v9['comparison_pages']==100
          assert v9['guided_question_pages']==100
          assert v9['new_indexable_urls']==279
          idx=ET.parse(r/'sitemap.xml').getroot()
          assert idx.tag.endswith('sitemapindex')
          print(v8); print(v9)
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload verified site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy verified site
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Submit all sitemap URLs to IndexNow
        continue-on-error: true
        run: |
          python - <<'PY'
          import json, urllib.request, xml.etree.ElementTree as ET
          from pathlib import Path
          base='https://khaledaltheeb.github.io/pterminology-site/'
          key='a4f9d7c2e81b4630b5d6f7a912ce3048'
          ns={'s':'http://www.sitemaps.org/schemas/sitemap/0.9'}
          idx=ET.parse('_site/sitemap.xml').getroot()
          maps=[n.text.rsplit('/',1)[-1] for n in idx.findall('s:sitemap/s:loc',ns) if n.text]
          urls=[]
          for name in maps:
              tree=ET.parse(Path('_site')/name).getroot()
              urls.extend(n.text for n in tree.findall('s:url/s:loc',ns) if n.text)
          for start in range(0,len(urls),10000):
              payload={'host':'khaledaltheeb.github.io','key':key,'keyLocation':base+key+'.txt','urlList':urls[start:start+10000]}
              req=urllib.request.Request('https://api.indexnow.org/indexnow',data=json.dumps(payload).encode(),headers={'Content-Type':'application/json; charset=utf-8'},method='POST')
              with urllib.request.urlopen(req,timeout=30) as response: print('IndexNow',response.status,len(payload['urlList']))
          PY
