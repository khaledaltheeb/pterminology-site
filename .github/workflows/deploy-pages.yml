name: Deploy psychology platform with v13 encyclopedia quality

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-validate-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      SITE_BASE: https://khaledaltheeb.github.io/pterminology-site/
    steps:
      - uses: actions/checkout@v4

      - name: Restore verified v10 sources
        run: |
          set -euxo pipefail
          mkdir -p /tmp/v10-content
          cp content/sectors-v10/*.json /tmp/v10-content/
          cat .v10bundle/part00 .v10bundle/part01 .v10bundle/part02 .v10bundle/part03 .v10bundle/part04 | base64 --decode > /tmp/v10.tar.gz
          tar -xzf /tmp/v10.tar.gz
          cp /tmp/v10-content/*.json content/sectors-v10/

      - name: Compile all generators and interfaces
        run: |
          set -euxo pipefail
          cat .generator-v6/part00 .generator-v6/part01 .generator-v6/part02 .generator-v6/part03 > build_site.py
          python scripts/verify_enricher_v7.py
          python scripts/verify_expander_v9.py
          python -m py_compile build_site.py scripts/scale_site_v8.py scripts/design_content_v10.py scripts/apply_contrast_v11.py scripts/expand_v12_direct.py scripts/rebuild_encyclopedia_v13.py scripts/run_encyclopedia_v13.py expand_site_v9.py
          node --check content/v12-direct/lab-v12.js

      - name: Build complete site and rebuild encyclopedia last
        run: |
          set -euxo pipefail
          python build_site.py
          python enrich_site_v7.py
          cp google644f1f7a8b7aaa2b.html _site/google644f1f7a8b7aaa2b.html
          python scripts/scale_site_v8.py
          python expand_site_v9.py
          python scripts/design_content_v10.py
          python scripts/apply_contrast_v11.py _site
          python scripts/expand_v12_direct.py _site
          python scripts/run_encyclopedia_v13.py 2>&1 | tee /tmp/v13-build.log

      - name: Validate v13 encyclopedia and platform contract
        run: |
          set -euo pipefail
          test "$(find _site/encyclopedia -mindepth 2 -name index.html | wc -l)" -eq 2000
          test "$(find _site/hubs -mindepth 2 -name index.html | wc -l)" -eq 200
          test "$(find _site/assessment-lab -mindepth 2 -name index.html | wc -l)" -eq 40
          test "$(find _site/cognitive-lab -mindepth 2 -name index.html | wc -l)" -eq 48
          test "$(grep -o '<url>' _site/sitemap-terms-1.xml | wc -l)" -eq 1000
          test "$(grep -o '<url>' _site/sitemap-terms-2.xml | wc -l)" -eq 1000
          test "$(grep -o '<url>' _site/sitemap-hubs.xml | wc -l)" -eq 201
          grep -q 'v13 encyclopedia quality system' _site/assets/css/encyclopedia-v13.css
          grep -q 'data-v13-article="1"' _site/encyclopedia/concept-0001/index.html
          ! grep -R -q 'يتناول هذا المدخل' _site/encyclopedia
          grep -q 'google-site-verification: google644f1f7a8b7aaa2b.html' _site/google644f1f7a8b7aaa2b.html
          python - <<'PY'
          import hashlib, json, re
          from collections import Counter
          from pathlib import Path
          root=Path('_site')
          report=json.loads((root/'api/encyclopedia-audit-v13.json').read_text(encoding='utf-8'))
          expected={'concept_pages':2000,'domain_hubs':100,'facet_hubs':20,'application_hubs':80,'hub_pages':200,'unique_titles':2000,'unique_article_hashes':2000,'unique_descriptions':2000,'repeated_long_paragraphs_over_25':0,'old_boilerplate_removed':True}
          for key,value in expected.items(): assert report.get(key)==value,(key,report.get(key),value)
          assert report['minimum_article_characters']>=1800,report
          pages=sorted((root/'encyclopedia').glob('concept-*/index.html'))
          titles=[];descriptions=[];hashes=set();paragraphs=Counter();failures=[]
          for page in pages:
              text=page.read_text(encoding='utf-8');rel=str(page.relative_to(root))
              checks={'h1':text.count('<h1>')==1,'article':text.count('data-v13-article="1"')==1,'main':text.count('<main class="ency-v13"')==1,'canonical':'rel="canonical"' in text,'schema':'application/ld+json' in text,'viewport':'name="viewport"' in text,'v13_css':'encyclopedia-v13.css' in text,'v12_css':'marshmallow-v12.css' in text,'sources':'مصادر رسمية للمراجعة' in text,'old_phrase':'يتناول هذا المدخل' not in text}
              bad=[k for k,v in checks.items() if not v]
              if bad: failures.append((rel,bad))
              title=re.search(r'<title>(.*?)</title>',text,re.S);desc=re.search(r'<meta name="description" content="(.*?)">',text,re.S);article=re.search(r'<article class="ency-v13__article"[^>]*>(.*?)</article>',text,re.S)
              assert title and desc and article,rel
              titles.append(title.group(1));descriptions.append(desc.group(1))
              plain=re.sub(r'<[^>]+>',' ',article.group(1));plain=re.sub(r'\s+',' ',plain).strip();assert len(plain)>=1800,(rel,len(plain))
              digest=hashlib.sha256(plain.encode()).hexdigest();assert digest not in hashes,rel;hashes.add(digest)
              for p in re.findall(r'<p[^>]*>(.*?)</p>',article.group(1),re.S):
                  p=re.sub(r'<[^>]+>',' ',p);p=re.sub(r'\s+',' ',p).strip()
                  if len(p)>=180: paragraphs[p]+=1
          assert not failures,failures[:10]
          assert len(set(titles))==2000 and len(set(descriptions))==2000
          repeated={p:c for p,c in paragraphs.items() if c>25};assert not repeated,list(repeated.items())[:3]
          verify=root/'google644f1f7a8b7aaa2b.html';assert verify.read_text(encoding='utf-8').strip()=='google-site-verification: google644f1f7a8b7aaa2b.html'
          print(json.dumps(report,ensure_ascii=False,indent=2))
          PY

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy verified site
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Submit sitemap URLs to IndexNow
        continue-on-error: true
        run: |
          python - <<'PY'
          import json, urllib.request, xml.etree.ElementTree as ET
          from pathlib import Path
          base='https://khaledaltheeb.github.io/pterminology-site/'
          key='a4f9d7c2e81b4630b5d6f7a912ce3048'
          ns={'s':'http://www.sitemaps.org/schemas/sitemap/0.9'}
          index=ET.parse('_site/sitemap.xml').getroot();maps=[node.text.rsplit('/',1)[-1] for node in index.findall('s:sitemap/s:loc',ns) if node.text]
          urls=[]
          for name in maps: urls.extend(node.text for node in ET.parse(Path('_site')/name).getroot().findall('s:url/s:loc',ns) if node.text)
          for start in range(0,len(urls),10000):
              payload={'host':'khaledaltheeb.github.io','key':key,'keyLocation':base+key+'.txt','urlList':urls[start:start+10000]}
              request=urllib.request.Request('https://api.indexnow.org/indexnow',data=json.dumps(payload).encode(),headers={'Content-Type':'application/json; charset=utf-8'},method='POST')
              with urllib.request.urlopen(request,timeout=30) as response: print('IndexNow',response.status,len(payload['urlList']))
          PY
