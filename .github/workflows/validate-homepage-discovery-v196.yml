name: Validate homepage discovery v196

on:
  pull_request:
    branches: [main]
    paths:
      - 'index.html'
      - 'scripts/apply_homepage_v20.py'
      - 'tests/test_homepage_discovery_v196.py'
      - 'tests/test_special_needs_publication_v73.py'
      - '.github/workflows/validate-care-guides-publication-v21.yml'
      - '.github/workflows/validate-homepage-discovery-v196.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile homepage production integration and tests
        run: python -m py_compile scripts/apply_homepage_v20.py tests/test_homepage_discovery_v196.py tests/test_special_needs_publication_v73.py
      - name: Run homepage discovery SEO schema accessibility and special-needs contracts
        run: python -m unittest -v tests/test_homepage_discovery_v196.py tests/test_special_needs_publication_v73.py
      - name: Build isolated homepage review artifact
        run: |
          mkdir -p artifacts/homepage-v196/api
          python - <<'PY'
          import importlib.util
          from pathlib import Path
          from unittest.mock import patch
          script = Path('scripts/apply_homepage_v20.py')
          spec = importlib.util.spec_from_file_location('homepage_v196', script)
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          site = Path('artifacts/homepage-v196').resolve()
          with patch.object(module, 'SITE', site), patch.object(module, 'TARGET', site / 'index.html'), patch.object(module, 'run_publisher'), patch.object(module, 'synchronize_care_guides_report'), patch.object(module, 'register_sitemap'):
              module.main()
          PY
          test -f artifacts/homepage-v196/index.html
          grep -q 'href="blog/"' artifacts/homepage-v196/index.html
          grep -q 'href="special-needs/"' artifacts/homepage-v196/index.html
          grep -q 'href="care-guides/">أدلة التعامل</a>' artifacts/homepage-v196/index.html
          grep -q 'أدلة التعامل مع الحالات' artifacts/homepage-v196/index.html
          grep -q '"status": "built-not-published"' artifacts/homepage-v196/api/homepage-discovery-v196.json
      - name: Upload isolated review artifact
        uses: actions/upload-artifact@v4
        with:
          name: homepage-discovery-v196
          path: artifacts/homepage-v196
          if-no-files-found: error
          retention-days: 30

  production-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Restore production sources
        run: |
          set -euxo pipefail
          mkdir -p /tmp/v10-content
          cp content/sectors-v10/*.json /tmp/v10-content/
          cat .v10bundle/part00 .v10bundle/part01 .v10bundle/part02 .v10bundle/part03 .v10bundle/part04 | base64 --decode > /tmp/v10.tar.gz
          tar -xzf /tmp/v10.tar.gz
          cp /tmp/v10-content/*.json content/sectors-v10/
          cat .generator-v6/part00 .generator-v6/part01 .generator-v6/part02 .generator-v6/part03 > build_site.py
          python scripts/verify_enricher_v7.py
          python scripts/verify_expander_v9.py
      - name: Run final production chain with concise diagnostics
        run: |
          set +e
          {
            set -euxo pipefail
            python build_site.py
            python enrich_site_v7.py
            cp google644f1f7a8b7aaa2b.html _site/google644f1f7a8b7aaa2b.html
            python scripts/scale_site_v8.py
            python expand_site_v9.py
            python scripts/design_content_v10.py
            python scripts/apply_contrast_v11.py _site
            python scripts/expand_v12_direct.py _site
            python scripts/run_encyclopedia_v13.py _site
            python scripts/performance_hotfix_v14.py _site
            python scripts/optimize_site_performance_v14.py _site
            python scripts/strip_nonlab_runtime_v14.py _site
            python scripts/finalize_pwa_v14.py _site
            python scripts/complete_core_sections_v15.py _site
            python scripts/apply_homepage_v20.py _site
            test -f _site/api/health-publication-gate-v192.json
            grep -q '"needs_specialist_review_published": false' _site/api/care-guides-v21.json
            test ! -d _site/care-guides/autism-family-practical-guide
            python scripts/polish_site_v16.py _site
            python scripts/audit_site_integrity_v13.py _site
          } > /tmp/homepage-v196-production.log 2>&1
          status=$?
          tail -n 100 /tmp/homepage-v196-production.log
          exit $status
      - name: Upload production diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: homepage-v196-production-log
          path: /tmp/homepage-v196-production.log
          if-no-files-found: error
          retention-days: 14
