name: Validate first Arabic research summary v197

on:
  pull_request:
    branches: [main]
    paths:
      - 'content/v197/magazine-phq-gad-instruction-emphasis-ar.json'
      - 'scripts/publish_magazine_research_summary_v197.py'
      - 'tests/test_magazine_research_summary_v197.py'
      - '.github/workflows/validate-magazine-research-summary-v197.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile publisher and tests
        run: |
          python -m py_compile scripts/publish_magazine_research_summary_v197.py tests/test_magazine_research_summary_v197.py

      - name: Validate scientific accuracy SEO safety schema contrast and idempotence
        run: python -m unittest -v tests/test_magazine_research_summary_v197.py

      - name: Build magazine foundation and first research summary in isolation
        run: |
          set -euxo pipefail
          rm -rf review-site
          mkdir -p review-site/about
          cat > review-site/index.html <<'HTML'
          <!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>مصطلحات علم النفس | منصة عربية للصحة النفسية</title><meta name="description" content="وصف تأسيسي"><meta property="og:title" content="مصطلحات علم النفس"><meta name="twitter:title" content="مصطلحات علم النفس"></head><body><header><a class="brand" href="./">مصطلحات علم النفس</a><nav><a href="encyclopedia/">الموسوعة</a></nav></header><main><h1>الرئيسية</h1></main><footer>قديم</footer></body></html>
          HTML
          cat > review-site/about/index.html <<'HTML'
          <!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>عن المنصة</title><meta name="description" content="عن المنصة"><link rel="canonical" href="https://example.test/about/"></head><body><main><h1>عن المنصة</h1></main></body></html>
          HTML
          python scripts/publish_institutional_foundation_v192.py review-site
          python scripts/publish_magazine_research_summary_v197.py review-site
          test -f review-site/magazine/phq9-gad7-instruction-wording-2026/index.html
          test -f review-site/sitemap-magazine-research.xml
          test -f review-site/api/magazine-research-summary-v197.json
          grep -q '−2.60 نقطة' review-site/magazine/phq9-gad7-instruction-wording-2026/index.html
          grep -q 'لم يكن تحسنًا علاجيًا' review-site/magazine/phq9-gad7-instruction-wording-2026/index.html
          grep -q '"@type": "Article"' review-site/magazine/phq9-gad7-instruction-wording-2026/index.html
          grep -q '"status": "built-not-published"' review-site/api/magazine-research-summary-v197.json
          grep -q '"published_research_summaries": 0' review-site/api/magazine-research-summary-v197.json
          test "$(grep -o '/magazine/phq9-gad7-instruction-wording-2026/' review-site/magazine/index.html | wc -l)" -eq 1
          ! grep -R -Eqi 'يعالج الاكتئاب|يشخص القلق نهائيًا|مراجعة اختصاصية مكتملة|منشور حيًا' review-site/magazine

      - name: Upload complete review artifact
        uses: actions/upload-artifact@v4
        with:
          name: magazine-research-summary-v197-review
          path: |
            review-site/magazine
            review-site/sitemap-magazine-research.xml
            review-site/api/magazine-research-summary-v197.json
            review-site/api/institutional-foundation-v192.json
          if-no-files-found: error
          retention-days: 14
