name: Validate unpublished content inventory v74

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile inventory auditor
        run: python -m py_compile scripts/audit_unpublished_content_v74.py
      - name: Test production graph and candidate classification
        run: python -m unittest tests/test_unpublished_content_audit_v74.py
      - name: Inventory all source content and production wiring
        shell: bash
        run: |
          set -o pipefail
          mkdir -p _audit
          python scripts/audit_unpublished_content_v74.py . 2>&1 | tee _audit/unpublished-content-v74-run.log
      - name: Upload unpublished content inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unpublished-content-v74
          path: |
            _audit/unpublished-content-v74.json
            _audit/unpublished-content-v74.md
            _audit/unpublished-content-v74-run.log
          if-no-files-found: error
          retention-days: 30
