name: Deploy validated main to GitHub Pages

on:
  workflow_run:
    workflows: ["Validate every assessment and cognitive tool v28"]
    types: [completed]

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download validated production artifact
        uses: actions/download-artifact@v4
        with:
          name: validated-production-site
          path: validated-site
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify artifact commit and PWA evidence
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euxo pipefail
          test -f validated-site/deployment.json
          test -f validated-site/sw.js
          test -f validated-site/manifest.webmanifest
          python - <<'PY'
          import json, os
          from pathlib import Path
          data=json.loads(Path('validated-site/deployment.json').read_text(encoding='utf-8'))
          expected=os.environ['EXPECTED_SHA']
          assert data.get('commit') == expected, (data, expected)
          assert int(data.get('pwa_pages', 0)) > 0, data
          manifest=json.loads(Path('validated-site/manifest.webmanifest').read_text(encoding='utf-8'))
          assert manifest.get('scope') == '/pterminology-site/', manifest
          assert manifest.get('start_url') == '/pterminology-site/', manifest
          sw=Path('validated-site/sw.js').read_text(encoding='utf-8')
          assert 'pterminology-v23-resilient-core' in sw, 'unexpected service-worker cache version'
          assert 'Promise.allSettled' in sw and 'cached===0' in sw and 'cache.addAll' not in sw, 'resilient cache guarantees missing'
          print({'artifact_commit': data['commit'], 'pwa_pages': data['pwa_pages'], 'status': 'matched'})
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: validated-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live deployment SHA and critical routes
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euxo pipefail
          BASE="${PAGE_URL%/}/"
          for i in $(seq 1 30); do
            if curl --retry 2 --retry-delay 2 -fsS "${BASE}deployment.json" -o /tmp/deployment.json; then break; fi
            sleep 10
          done
          python - <<'PY'
          import json, os
          from pathlib import Path
          data=json.loads(Path('/tmp/deployment.json').read_text(encoding='utf-8'))
          expected=os.environ['EXPECTED_SHA']
          assert data.get('commit') == expected, (data, expected)
          assert int(data.get('pwa_pages', 0)) > 0, data
          print({'live_commit': data['commit'], 'pwa_pages': data['pwa_pages'], 'status': 'matched'})
          PY
          curl --retry 3 --retry-delay 3 -fsS "${BASE}" >/tmp/live-index.html
          curl --retry 3 --retry-delay 3 -fsS "${BASE}sitemap.xml" >/dev/null
          curl --retry 3 --retry-delay 3 -fsS "${BASE}manifest.webmanifest" >/tmp/live-manifest.json
          curl --retry 3 --retry-delay 3 -fsS "${BASE}sw.js" >/tmp/live-sw.js
          grep -q "navigator.serviceWorker.register" /tmp/live-index.html
          grep -q "sw.js" /tmp/live-index.html
          grep -q "pterminology-v23-resilient-core" /tmp/live-sw.js
          grep -q "Promise.allSettled" /tmp/live-sw.js
          grep -q "cached===0" /tmp/live-sw.js
          ! grep -q "cache.addAll" /tmp/live-sw.js
