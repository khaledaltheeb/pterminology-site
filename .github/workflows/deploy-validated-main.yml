name: Deploy validated main to GitHub Pages

on:
  workflow_run:
    workflows: ["Validate every assessment and cognitive tool v31"]
    types: [completed]

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download validated production artifact
        uses: actions/download-artifact@v4
        with:
          name: validated-production-site
          path: validated-site
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify artifact commit and integrity evidence
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euxo pipefail
          test -f validated-site/deployment.json
          python - <<'PY'
          import hashlib,json,os
          from pathlib import Path
          root=Path('validated-site')
          data=json.loads((root/'deployment.json').read_text(encoding='utf-8'))
          expected=os.environ['EXPECTED_SHA']
          assert data.get('schema_version') == 29, data
          assert data.get('commit') == expected, (data, expected)
          assert int(data.get('pwa_pages', 0)) > 0, data
          required=('index.html','sitemap.xml','manifest.webmanifest','sw.js')
          assert set(data.get('artifacts',{})) == set(required), data
          for name in required:
              path=root/name
              assert path.is_file(), name
              digest=hashlib.sha256(path.read_bytes()).hexdigest()
              evidence=data['artifacts'][name]
              assert digest == evidence['sha256'], (name,digest,evidence)
              assert path.stat().st_size == evidence['bytes'], (name,path.stat().st_size,evidence)
          manifest=json.loads((root/'manifest.webmanifest').read_text(encoding='utf-8'))
          assert manifest.get('scope') == '/pterminology-site/', manifest
          assert manifest.get('start_url') == '/pterminology-site/', manifest
          sw=(root/'sw.js').read_text(encoding='utf-8')
          assert 'pterminology-v23-resilient-core' in sw, 'unexpected service-worker cache version'
          assert 'Promise.allSettled' in sw and 'cached===0' in sw and 'cache.addAll' not in sw, 'resilient cache guarantees missing'
          print({'artifact_commit':data['commit'],'pwa_pages':data['pwa_pages'],'digests':len(required),'status':'matched'})
          PY

      - name: Verify institutional production artifact before deployment
        run: |
          set -euxo pipefail
          test -f validated-site/magazine/index.html
          test -f validated-site/partners/index.html
          test -f validated-site/sitemap-institutional-foundation.xml
          test -f validated-site/api/institutional-foundation-v192.json
          python - <<'PY'
          import json
          import xml.etree.ElementTree as ET
          from pathlib import Path
          root=Path('validated-site')
          magazine=(root/'magazine/index.html').read_text(encoding='utf-8')
          partners=(root/'partners/index.html').read_text(encoding='utf-8')
          homepage=(root/'index.html').read_text(encoding='utf-8')
          report=json.loads((root/'api/institutional-foundation-v192.json').read_text(encoding='utf-8'))
          assert report.get('status') == 'built-not-published', report
          assert report.get('declared_partners') == 0, report
          assert report.get('declared_donors') == 0, report
          assert report.get('published_research_summaries') == 0, report
          assert 'مجلة الصحة النفسية والبحث العلمي' in magazine
          assert 'لم تُنشر في هذه الحزمة ملخصات دراسات منفردة بعد' in magazine
          assert 'المانحون المعلنون:</strong> لا يوجد' in partners
          assert 'الشركاء الرسميون المعلنون:</strong> لا يوجد' in partners
          assert 'institutional-footer-v192:start' in homepage
          sitemap=ET.parse(root/'sitemap-institutional-foundation.xml').getroot()
          urls=[(node.text or '').strip() for node in sitemap.findall('{*}url/{*}loc')]
          expected={
              'https://khaledaltheeb.github.io/pterminology-site/magazine/',
              'https://khaledaltheeb.github.io/pterminology-site/partners/',
          }
          assert set(urls) == expected and len(urls) == 2, urls
          print({'institutional_pages':len(urls),'footer_verified':True,'status':'artifact-ready-not-yet-live'})
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: validated-site

      - name: Reject stale validated main run
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl --retry 3 --retry-delay 2 -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/ref/heads/main" \
            -o /tmp/current-main.json
          python - <<'PY'
          import json,os
          from pathlib import Path
          current=json.loads(Path('/tmp/current-main.json').read_text(encoding='utf-8'))['object']['sha']
          expected=os.environ['EXPECTED_SHA']
          assert current == expected, {
              'reason':'stale validated workflow run must not deploy',
              'validated_sha':expected,
              'current_main_sha':current,
          }
          print({'validated_sha':expected,'current_main_sha':current,'status':'current-main-confirmed'})
          PY

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live deployment SHA exact digests and institutional routes
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euxo pipefail
          BASE="${PAGE_URL%/}/"
          TOKEN="${EXPECTED_SHA}"
          for i in $(seq 1 30); do
            if curl --retry 2 --retry-delay 2 -H 'Cache-Control: no-cache' -fsS "${BASE}deployment.json?v=${TOKEN}" -o /tmp/deployment.json; then break; fi
            sleep 10
          done
          python - <<'PY'
          import json,os
          from pathlib import Path
          data=json.loads(Path('/tmp/deployment.json').read_text(encoding='utf-8'))
          expected=os.environ['EXPECTED_SHA']
          assert data.get('schema_version') == 29, data
          assert data.get('commit') == expected, (data, expected)
          assert int(data.get('pwa_pages', 0)) > 0, data
          print({'live_commit':data['commit'],'pwa_pages':data['pwa_pages'],'status':'stamp-matched'})
          PY
          curl --retry 3 --retry-delay 3 -H 'Cache-Control: no-cache' -fsS "${BASE}?v=${TOKEN}" -o /tmp/live-index.html
          curl --retry 3 --retry-delay 3 -H 'Cache-Control: no-cache' -fsS "${BASE}sitemap.xml?v=${TOKEN}" -o /tmp/live-sitemap.xml
          curl --retry 3 --retry-delay 3 -H 'Cache-Control: no-cache' -fsS "${BASE}manifest.webmanifest?v=${TOKEN}" -o /tmp/live-manifest.json
          curl --retry 3 --retry-delay 3 -H 'Cache-Control: no-cache' -fsS "${BASE}sw.js?v=${TOKEN}" -o /tmp/live-sw.js
          curl --retry 3 --retry-delay 3 -H 'Cache-Control: no-cache' -fsS "${BASE}magazine/?v=${TOKEN}" -o /tmp/live-magazine.html
          curl --retry 3 --retry-delay 3 -H 'Cache-Control: no-cache' -fsS "${BASE}partners/?v=${TOKEN}" -o /tmp/live-partners.html
          curl --retry 3 --retry-delay 3 -H 'Cache-Control: no-cache' -fsS "${BASE}sitemap-institutional-foundation.xml?v=${TOKEN}" -o /tmp/live-institutional-sitemap.xml
          curl --retry 3 --retry-delay 3 -H 'Cache-Control: no-cache' -fsS "${BASE}api/institutional-foundation-v192.json?v=${TOKEN}" -o /tmp/live-institutional-report.json
          python - <<'PY'
          import hashlib,json
          import xml.etree.ElementTree as ET
          from pathlib import Path
          data=json.loads(Path('/tmp/deployment.json').read_text(encoding='utf-8'))
          files={
            'index.html':Path('/tmp/live-index.html'),
            'sitemap.xml':Path('/tmp/live-sitemap.xml'),
            'manifest.webmanifest':Path('/tmp/live-manifest.json'),
            'sw.js':Path('/tmp/live-sw.js'),
          }
          for name,path in files.items():
              digest=hashlib.sha256(path.read_bytes()).hexdigest()
              expected=data['artifacts'][name]
              assert digest == expected['sha256'], (name,digest,expected)
              assert path.stat().st_size == expected['bytes'], (name,path.stat().st_size,expected)
          manifest=json.loads(files['manifest.webmanifest'].read_text(encoding='utf-8'))
          assert manifest.get('scope') == '/pterminology-site/', manifest
          assert manifest.get('start_url') == '/pterminology-site/', manifest
          index=files['index.html'].read_text(encoding='utf-8')
          sw=files['sw.js'].read_text(encoding='utf-8')
          magazine=Path('/tmp/live-magazine.html').read_text(encoding='utf-8')
          partners=Path('/tmp/live-partners.html').read_text(encoding='utf-8')
          report=json.loads(Path('/tmp/live-institutional-report.json').read_text(encoding='utf-8'))
          assert 'navigator.serviceWorker.register' in index and 'sw.js' in index
          assert 'pterminology-v23-resilient-core' in sw
          assert 'Promise.allSettled' in sw and 'cached===0' in sw and 'cache.addAll' not in sw
          assert 'institutional-footer-v192:start' in index
          assert 'مجلة الصحة النفسية والبحث العلمي' in magazine
          assert 'لم تُنشر في هذه الحزمة ملخصات دراسات منفردة بعد' in magazine
          assert 'المانحون المعلنون:</strong> لا يوجد' in partners
          assert 'الشركاء الرسميون المعلنون:</strong> لا يوجد' in partners
          assert report.get('status') == 'built-not-published', report
          assert report.get('declared_partners') == 0 and report.get('declared_donors') == 0, report
          sitemap=ET.parse('/tmp/live-institutional-sitemap.xml').getroot()
          urls=[(node.text or '').strip() for node in sitemap.findall('{*}url/{*}loc')]
          expected_urls={
              'https://khaledaltheeb.github.io/pterminology-site/magazine/',
              'https://khaledaltheeb.github.io/pterminology-site/partners/',
          }
          assert set(urls) == expected_urls and len(urls) == 2, urls
          print({'live_digests_verified':len(files),'institutional_routes_verified':len(urls),'live_footer_verified':True,'status':'live-sha-and-routes-verified'})
          PY
