name: Validate full site audit v16

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-audit:
    runs-on: ubuntu-latest
    env:
      SITE_BASE: https://khaledaltheeb.github.io/pterminology-site/
    steps:
      - uses: actions/checkout@v4
      - name: Restore and compile all sources
        run: |
          set -euxo pipefail
          mkdir -p /tmp/v10-content
          cp content/sectors-v10/*.json /tmp/v10-content/
          cat .v10bundle/part00 .v10bundle/part01 .v10bundle/part02 .v10bundle/part03 .v10bundle/part04 | base64 --decode > /tmp/v10.tar.gz
          tar -xzf /tmp/v10.tar.gz
          cp /tmp/v10-content/*.json content/sectors-v10/
          cat .generator-v6/part00 .generator-v6/part01 .generator-v6/part02 .generator-v6/part03 > build_site.py
          python scripts/verify_enricher_v7.py
          python scripts/verify_expander_v9.py
          python -m py_compile build_site.py expand_site_v9.py scripts/scale_site_v8.py scripts/design_content_v10.py scripts/apply_contrast_v11.py scripts/expand_v12_direct.py scripts/rebuild_encyclopedia_v13.py scripts/run_encyclopedia_v13.py scripts/performance_hotfix_v14.py scripts/optimize_site_performance_v14.py scripts/strip_nonlab_runtime_v14.py scripts/finalize_pwa_v14.py scripts/audit_site_integrity_v13.py scripts/verify_performance_v14.py scripts/complete_core_sections_v15.py scripts/verify_core_sections_v15.py scripts/polish_site_v16.py scripts/audit_full_site_v16.py scripts/audit_full_site_i18n_v72.py scripts/apply_homepage_v20.py scripts/publish_homepage_i18n_v72.py
          node --check content/v15/lab-v15.js
          node --check scripts/test_lab_v15.js
          node --check scripts/browser_audit_v16.mjs
      - name: Build final production output
        run: |
          set -euxo pipefail
          python build_site.py
          python enrich_site_v7.py
          cp google644f1f7a8b7aaa2b.html _site/google644f1f7a8b7aaa2b.html
          python scripts/scale_site_v8.py
          python expand_site_v9.py
          python scripts/design_content_v10.py
          python scripts/apply_contrast_v11.py _site
          python scripts/expand_v12_direct.py _site
          python scripts/run_encyclopedia_v13.py _site
          python scripts/performance_hotfix_v14.py _site
          python scripts/optimize_site_performance_v14.py _site
          python scripts/strip_nonlab_runtime_v14.py _site
          python scripts/finalize_pwa_v14.py _site
          python scripts/complete_core_sections_v15.py _site
          python scripts/apply_homepage_v20.py _site
          python scripts/polish_site_v16.py _site
          python scripts/audit_site_integrity_v13.py _site
          node scripts/test_lab_v15.js _site
          python scripts/verify_performance_v14.py _site
          python scripts/verify_core_sections_v15.py _site
      - name: Run comprehensive multilingual static audit
        run: |
          set -euxo pipefail
          python scripts/audit_full_site_i18n_v72.py _site
      - name: Install browser audit runtime
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Run real browser, mobile and interaction audit
        run: |
          set -euxo pipefail
          mkdir -p preview
          ln -s "$PWD/_site" preview/pterminology-site
          python -m http.server 8000 --directory preview >/tmp/pterminology-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          for i in $(seq 1 30); do curl -fsS http://127.0.0.1:8000/pterminology-site/ >/dev/null && break; sleep 1; done
          AUDIT_BASE_URL=http://127.0.0.1:8000/pterminology-site/ AUDIT_OUT_DIR=_site/api node scripts/browser_audit_v16.mjs
      - name: Upload complete audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-site-audit-v16
          path: |
            _site/api/polish-v16.json
            _site/api/full-site-audit-v16.json
            _site/api/browser-audit-v16.json
            _site/api/site-integrity-v13.json
            _site/api/core-sections-audit-v15.json
            _site/api/performance-verification-v14.json
            /tmp/pterminology-http.log
          if-no-files-found: warn
          retention-days: 14
