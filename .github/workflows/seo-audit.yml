name: Audit verified Arabic psychology SEO v7

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify generators and build v7 site
        env:
          SITE_BASE: https://khaledaltheeb.github.io/pterminology-site/
        run: |
          set -euo pipefail
          cat \
            .generator-v6/part00 \
            .generator-v6/part01 \
            .generator-v6/part02 \
            .generator-v6/part03 \
            > build_site.py
          python -m py_compile build_site.py
          python scripts/verify_enricher_v7.py
          python build_site.py
          python enrich_site_v7.py

      - name: Audit metadata, links, uniqueness and architecture
        run: |
          python - <<'PY'
          from __future__ import annotations

          import re
          import sys
          import xml.etree.ElementTree as ET
          from collections import Counter
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import unquote, urlparse

          root = Path("_site").resolve()
          host = "khaledaltheeb.github.io"
          base_path = "/pterminology-site/"
          errors: list[str] = []
          titles: list[str] = []
          canonicals: list[str] = []

          class Parser(HTMLParser):
              def __init__(self) -> None:
                  super().__init__()
                  self.links: list[str] = []

              def handle_starttag(self, tag, attrs):
                  values = dict(attrs)
                  if tag in {"a", "link", "script", "img"}:
                      value = values.get("href") or values.get("src")
                      if value:
                          self.links.append(value)

          def extract(pattern: str, text: str) -> str:
              match = re.search(pattern, text, flags=re.I | re.S)
              return re.sub(r"\s+", " ", match.group(1)).strip() if match else ""

          def resolve(page: Path, link: str) -> Path | None:
              parsed = urlparse(link)
              if link.startswith("#") or parsed.scheme in {"mailto", "tel", "data", "javascript"}:
                  return None
              if parsed.scheme in {"http", "https"} and parsed.netloc != host:
                  return None
              clean = unquote(parsed.path)
              if not clean:
                  return None
              if clean.startswith(base_path):
                  target = root / clean[len(base_path):]
              elif clean.startswith("/"):
                  return None
              else:
                  target = page.parent / clean
              if clean.endswith("/") or target.is_dir():
                  target = target / "index.html"
              return target

          html_files = sorted(root.rglob("*.html"))
          for page in html_files:
              rel = page.relative_to(root)
              text = page.read_text(encoding="utf-8")
              is_404 = rel.as_posix() == "404.html"

              title = extract(r"<title>(.*?)</title>", text)
              description = extract(r'<meta\s+name=["\']description["\']\s+content=["\'](.*?)["\']', text)
              canonical = extract(r'<link\s+rel=["\']canonical["\']\s+href=["\'](.*?)["\']', text)

              if not title:
                  errors.append(f"Missing title: {rel}")
              if not description:
                  errors.append(f"Missing description: {rel}")
              if not canonical:
                  errors.append(f"Missing canonical: {rel}")
              if not is_404 and "application/ld+json" not in text:
                  errors.append(f"Missing JSON-LD: {rel}")
              if not is_404 and 'hreflang="ar"' not in text:
                  errors.append(f"Missing Arabic hreflang: {rel}")
              if not is_404 and 'hreflang="x-default"' not in text:
                  errors.append(f"Missing x-default hreflang: {rel}")

              if title:
                  titles.append(title)
              if canonical:
                  canonicals.append(canonical)

              parser = Parser()
              parser.feed(text)
              for link in parser.links:
                  target = resolve(page, link)
                  if target is not None and not target.exists():
                      errors.append(f"Broken internal resource in {rel}: {link}")

          for label, values in (("title", titles), ("canonical", canonicals)):
              for value, count in Counter(values).items():
                  if count > 1:
                      errors.append(f"Duplicate {label} ({count}): {value}")

          sitemap = root / "sitemap.xml"
          namespace = {"s": "http://www.sitemaps.org/schemas/sitemap/0.9"}
          sitemap_root = ET.parse(sitemap).getroot()
          sitemap_urls = [node.text for node in sitemap_root.findall("s:url/s:loc", namespace) if node.text]
          if len(sitemap_urls) < 295:
              errors.append(f"Sitemap has only {len(sitemap_urls)} URLs")
          for value, count in Counter(sitemap_urls).items():
              if count > 1:
                  errors.append(f"Duplicate sitemap URL ({count}): {value}")

          expected = {
              "term pages": (len(list((root / "terms").glob("*/index.html"))), 200),
              "guide pages": (len(list((root / "guides").glob("*/index.html"))), 20),
              "interactive tool pages": (len(list((root / "tools").glob("*/index.html"))), 4),
          }
          for name, (actual, required) in expected.items():
              if actual != required:
                  errors.append(f"Expected {required} {name}, found {actual}")

          homepage = (root / "index.html").read_text(encoding="utf-8")
          for required_text in ("افهم المصطلح، لا تكتفِ باسمه", "استكشف بطرق مختلفة"):
              if required_text not in homepage:
                  errors.append(f"Homepage missing: {required_text}")
          for rejected_text in ("شارك الحساب", "تنبيه مهني"):
              if rejected_text in homepage:
                  errors.append(f"Rejected homepage text returned: {rejected_text}")

          print(f"HTML pages checked: {len(html_files)}")
          print(f"Sitemap URLs: {len(sitemap_urls)}")
          print(f"Unique titles: {len(set(titles))}")
          print(f"Unique canonicals: {len(set(canonicals))}")

          if errors:
              print("\nSEO audit failed:")
              for error in errors:
                  print("-", error)
              sys.exit(1)

          print("SEO audit passed.")
          PY
