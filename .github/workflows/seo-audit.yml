name: Audit Arabic psychology SEO v6

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reconstruct and build site
        env:
          SITE_BASE: https://khaledaltheeb.github.io/pterminology-site/
        run: |
          set -euo pipefail
          cat \
            .generator-v6/part00 \
            .generator-v6/part01 \
            .generator-v6/part02 \
            .generator-v6/part03 \
            > build_site.py
          python -m py_compile build_site.py
          python build_site.py

      - name: Audit metadata, sitemap and internal links
        run: |
          python - <<'PY'
          from __future__ import annotations

          import re
          import sys
          import xml.etree.ElementTree as ET
          from collections import Counter
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import unquote, urlparse

          root = Path("_site").resolve()
          production_host = "khaledaltheeb.github.io"
          base_path = "/pterminology-site/"
          html_files = sorted(root.rglob("*.html"))

          errors: list[str] = []
          titles: list[str] = []
          descriptions: list[str] = []
          canonicals: list[str] = []

          class LinkParser(HTMLParser):
              def __init__(self) -> None:
                  super().__init__()
                  self.links: list[str] = []

              def handle_starttag(
                  self,
                  tag: str,
                  attrs: list[tuple[str, str | None]],
              ) -> None:
                  attrs_dict = dict(attrs)
                  if tag in {"a", "link", "script", "img"}:
                      value = attrs_dict.get("href") or attrs_dict.get("src")
                      if value:
                          self.links.append(value)

          def extract(pattern: str, text: str) -> str:
              match = re.search(pattern, text, flags=re.I | re.S)
              if not match:
                  return ""
              return re.sub(r"\s+", " ", match.group(1)).strip()

          def resolve_internal(page: Path, link: str) -> Path | None:
              parsed = urlparse(link)
              if parsed.scheme in {"mailto", "tel", "data", "javascript"}:
                  return None
              if link.startswith("#"):
                  return None
              if parsed.scheme in {"http", "https"} and parsed.netloc != production_host:
                  return None

              clean = unquote(parsed.path)
              if not clean:
                  return None

              if clean.startswith(base_path):
                  target = root / clean[len(base_path):]
              elif clean.startswith("/"):
                  return None
              else:
                  target = page.parent / clean

              if clean.endswith("/") or target.is_dir():
                  target = target / "index.html"
              return target

          for page in html_files:
              text = page.read_text(encoding="utf-8")
              rel = page.relative_to(root)
              is_404 = rel.as_posix() == "404.html"

              title = extract(r"<title>(.*?)</title>", text)
              description = extract(
                  r'<meta\s+name=["\']description["\']\s+content=["\'](.*?)["\']',
                  text,
              )
              canonical = extract(
                  r'<link\s+rel=["\']canonical["\']\s+href=["\'](.*?)["\']',
                  text,
              )

              if not title:
                  errors.append(f"Missing title: {rel}")
              if not description:
                  errors.append(f"Missing description: {rel}")
              if not canonical:
                  errors.append(f"Missing canonical: {rel}")
              if not is_404 and "application/ld+json" not in text:
                  errors.append(f"Missing JSON-LD: {rel}")
              if not is_404 and 'hreflang="ar"' not in text:
                  errors.append(f"Missing Arabic hreflang: {rel}")
              if not is_404 and 'hreflang="x-default"' not in text:
                  errors.append(f"Missing x-default hreflang: {rel}")

              if title:
                  titles.append(title)
              if description:
                  descriptions.append(description)
              if canonical:
                  canonicals.append(canonical)

              parser = LinkParser()
              parser.feed(text)
              for link in parser.links:
                  target = resolve_internal(page, link)
                  if target is not None and not target.exists():
                      errors.append(f"Broken internal resource in {rel}: {link}")

          for label, values in (
              ("title", titles),
              ("description", descriptions),
              ("canonical", canonicals),
          ):
              for value, count in Counter(values).items():
                  if count > 1:
                      errors.append(f"Duplicate {label} ({count}): {value}")

          sitemap_path = root / "sitemap.xml"
          if not sitemap_path.exists():
              errors.append("Missing sitemap.xml")
              sitemap_urls: list[str] = []
          else:
              namespace = {"s": "http://www.sitemaps.org/schemas/sitemap/0.9"}
              sitemap_root = ET.parse(sitemap_path).getroot()
              sitemap_urls = [
                  node.text
                  for node in sitemap_root.findall("s:url/s:loc", namespace)
                  if node.text
              ]
              if len(sitemap_urls) < 240:
                  errors.append(f"Sitemap has only {len(sitemap_urls)} URLs")
              for value, count in Counter(sitemap_urls).items():
                  if count > 1:
                      errors.append(f"Duplicate sitemap URL ({count}): {value}")

          term_pages = list((root / "terms").glob("*/index.html"))
          guide_pages = list((root / "guides").glob("*/index.html"))
          category_pages = list((root / "categories").glob("*/index.html"))

          if len(term_pages) != 200:
              errors.append(f"Expected 200 term pages, found {len(term_pages)}")
          if len(guide_pages) != 20:
              errors.append(f"Expected 20 guide pages, found {len(guide_pages)}")
          if len(category_pages) < 15:
              errors.append(f"Expected at least 15 category pages, found {len(category_pages)}")

          homepage = (root / "index.html").read_text(encoding="utf-8")
          if "شارك الحساب" in homepage:
              errors.append("Rejected sharing section is present on homepage")
          if "تنبيه مهني" in homepage:
              errors.append("Rejected disclaimer heading is present on homepage")

          print(f"HTML pages checked: {len(html_files)}")
          print(f"Term pages: {len(term_pages)}")
          print(f"Guide pages: {len(guide_pages)}")
          print(f"Category pages: {len(category_pages)}")
          print(f"Sitemap URLs: {len(sitemap_urls)}")
          print(f"Unique titles: {len(set(titles))}")
          print(f"Unique canonicals: {len(set(canonicals))}")

          if errors:
              print("\nSEO audit failed:")
              for error in errors:
                  print("-", error)
              sys.exit(1)

          print("SEO audit passed.")
          PY
